<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fortschritt – Gitarrenübungen</title>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <link rel="stylesheet" href="assets/style.css">
  <style>
    .verlauf-wrap {
      overflow-x: auto;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
    }

    .verlauf-table {
      width: 100%;
      border-collapse: collapse;
    }

    .verlauf-table thead th {
      padding: 0.85rem 1.5rem;
      text-align: left;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      color: var(--text3);
      border-bottom: 1px solid var(--border2);
      background: var(--surface2);
      white-space: nowrap;
      font-weight: 500;
      font-family: 'DM Mono', monospace;
    }

    .verlauf-table tbody td {
      padding: 1.25rem 1.5rem;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
      font-family: 'DM Mono', monospace;
    }

    .verlauf-table tbody tr:last-child td { border-bottom: none; }
  </style>
</head>
<body>

<header class="app-header">
  <div class="app-header-inner">
    <a class="back-btn" href="index.html">← Übersicht</a>
    <span class="header-title">Fortschritt</span>
    <a class="btn btn-ghost btn-sm" href="akkord-bandit.html">🎲 Bandit</a>
  </div>
</header>

<main class="main">
  <div class="container" style="max-width:900px">
    <div id="verlauf-panel"></div>
  </div>
</main>

<script>
const AKKORD_TYPEN = [
  { key: 'dom7',    label: 'Dom 7'      },
  { key: 'maj7',    label: 'Maj 7'      },
  { key: 'moll7',   label: 'Moll 7'     },
  { key: 'moll7b5', label: 'Moll 7/b5'  },
  { key: 'dim7',    label: 'Dim 7'      },
];

function migrateAltesDaten() {
  if (localStorage.getItem('gitueben_geuebt')) return;
  const raw = localStorage.getItem('gitueben_fortschritt');
  if (!raw) return;
  try {
    const saved = JSON.parse(raw);
    const geuebt = {};
    AKKORD_TYPEN.forEach(({ key }) => {
      const arr = saved[key];
      if (!Array.isArray(arr)) return;
      let total = 0, letzteZeit = '';
      arr.forEach(v => {
        const c = typeof v === 'boolean' ? (v ? 1 : 0)
                : (typeof v?.count === 'number' ? v.count : (v?.done ? 1 : 0));
        total += c;
        if (c > 0 && v?.zeit) letzteZeit = v.zeit;
      });
      if (total > 0) geuebt[key] = { count: total, zeit: letzteZeit };
    });
    localStorage.setItem('gitueben_geuebt', JSON.stringify(geuebt));
  } catch(e) {}
}

function renderVerlauf() {
  const panel = document.getElementById('verlauf-panel');
  const ZIEL  = 1000;

  let geuebt = {};
  try { geuebt = JSON.parse(localStorage.getItem('gitueben_geuebt') || '{}'); } catch(e) {}
  let proGeuebt = {};
  try { proGeuebt = JSON.parse(localStorage.getItem('gitueben_pro_geuebt') || '{}'); } catch(e) {}

  const rows = AKKORD_TYPEN.map(({ key, label }) => {
    const g     = geuebt[key]   || { count: 0, zeit: '' };
    const p     = proGeuebt[key];
    const pro   = typeof p === 'number' ? p : (p?.count || 0);
    const total = g.count;
    const pct   = Math.min(Math.round((total / ZIEL) * 100), 100);
    const farbe  = total >= ZIEL ? 'var(--accent2)' : 'var(--accent)';
    const txtCol = total >= ZIEL ? 'var(--accent2)' : 'var(--text2)';

    return `<tr>
      <td style="font-size:1.1rem;font-weight:600;color:var(--text);white-space:nowrap;">${label}</td>
      <td style="font-size:0.95rem;color:var(--text3);white-space:nowrap;">${g.zeit || '–'}</td>
      <td style="min-width:280px;">
        <div style="font-size:1.05rem;font-weight:600;color:${txtCol};margin-bottom:8px;">${total} / ${ZIEL}</div>
        <div style="height:8px;background:var(--border);border-radius:4px;overflow:hidden;">
          <div style="height:100%;width:${pct}%;background:${farbe};border-radius:4px;transition:width 0.4s ease;"></div>
        </div>
      </td>
      <td style="font-size:1.05rem;font-weight:600;color:var(--accent);text-align:center;">${pro > 0 ? pro : '–'}</td>
    </tr>`;
  }).join('');

  panel.innerHTML = `
    <div class="verlauf-wrap">
      <table class="verlauf-table">
        <thead><tr>
          <th>Akkordtyp</th>
          <th>Letzte Übung</th>
          <th>Geübt</th>
          <th>Geübt Pro</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}

window.addEventListener('pageshow', () => { migrateAltesDaten(); renderVerlauf(); });
</script>
</body>
</html>
