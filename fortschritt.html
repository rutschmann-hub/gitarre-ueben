<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fortschritt – Gitarrenübungen</title>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <link rel="stylesheet" href="assets/style.css">
  <style>
    .verlauf-wrap {
      overflow-x: auto;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
    }

    .verlauf-table {
      width: 100%;
      border-collapse: collapse;
    }

    .verlauf-table thead th {
      padding: 0.85rem 1.5rem;
      text-align: left;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      color: var(--text3);
      border-bottom: 1px solid var(--border2);
      background: var(--surface2);
      white-space: nowrap;
      font-weight: 500;
      font-family: 'DM Mono', monospace;
    }

    .verlauf-table tbody td {
      padding: 1.25rem 1.5rem;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
      font-family: 'DM Mono', monospace;
    }

    .verlauf-table tbody tr:last-child td { border-bottom: none; }
  </style>
</head>
<body>

<header class="app-header">
  <div class="app-header-inner">
    <a class="back-btn" href="index.html">← Übersicht</a>
    <span class="header-title">Fortschritt</span>
    <a class="btn btn-ghost btn-sm" href="akkord-bandit.html">🎲 Bandit</a>
  </div>
</header>

<main class="main">
  <div class="container" style="max-width:900px">
    <div id="verlauf-panel"></div>
  </div>
</main>

<script src="assets/sheet-api.js"></script>
<script>
const AKKORD_TYPEN = [
  { key: 'dom7',    label: 'Dom 7'      },
  { key: 'maj7',    label: 'Maj 7'      },
  { key: 'moll7',   label: 'Moll 7'     },
  { key: 'moll7b5', label: 'Moll 7/b5'  },
  { key: 'dim7',    label: 'Dim 7'      },
];

const GRUNDTOENE = ['C','Db','D','Eb','E','F','Gb','G','Ab','A','Bb','B'];

function migrateAltesDaten() {
  if (localStorage.getItem('gitueben_migrated')) return;
  localStorage.setItem('gitueben_migrated', '1');
  const raw = localStorage.getItem('gitueben_fortschritt');
  if (!raw) return;
  try {
    const saved = JSON.parse(raw);
    let geuebt = {};
    try { geuebt = JSON.parse(localStorage.getItem('gitueben_geuebt') || '{}'); } catch(e) {}
    let changed = false;
    AKKORD_TYPEN.forEach(({ key }) => {
      const arr = saved[key];
      if (!Array.isArray(arr)) return;
      let oldTotal = 0, oldZeit = '';
      arr.forEach(v => {
        const c = typeof v === 'boolean' ? (v ? 1 : 0)
                : (typeof v?.count === 'number' ? v.count : (v?.done ? 1 : 0));
        oldTotal += c;
        if (c > 0 && v?.zeit) oldZeit = v.zeit;
      });
      if (oldTotal === 0) return;
      const curr = geuebt[key] || { count: 0, zeit: '' };
      geuebt[key] = { count: curr.count + oldTotal, zeit: curr.zeit || oldZeit };
      changed = true;
    });
    if (changed) localStorage.setItem('gitueben_geuebt', JSON.stringify(geuebt));
  } catch(e) {}
}

// Alte Zähler-Form war { [typ]: {count, zeit} } bzw. { [typ]: zahl } – ohne
// Tonart. Migriert einmalig zu { [typ]: { unbekannt: {count, zeit}, [grundton]: {...} } },
// damit alte Gesamtzahlen erhalten bleiben, auch ohne bekannte Tonart.
function migriereZuGrundtonFormat() {
  if (localStorage.getItem('gitueben_migrated_grundton')) return;
  localStorage.setItem('gitueben_migrated_grundton', '1');
  ['gitueben_geuebt', 'gitueben_pro_geuebt'].forEach(key => {
    let zaehler = {};
    try { zaehler = JSON.parse(localStorage.getItem(key) || '{}'); } catch(e) { return; }
    let changed = false;
    Object.keys(zaehler).forEach(typ => {
      const eintrag = zaehler[typ];
      if (typeof eintrag === 'number') {
        zaehler[typ] = { unbekannt: { count: eintrag, zeit: '' } };
        changed = true;
      } else if (eintrag && typeof eintrag.count === 'number') {
        zaehler[typ] = { unbekannt: { count: eintrag.count, zeit: eintrag.zeit || '' } };
        changed = true;
      }
    });
    if (changed) localStorage.setItem(key, JSON.stringify(zaehler));
  });
}

function zahlVon(eintrag) {
  if (!eintrag) return 0;
  return typeof eintrag === 'number' ? eintrag : (eintrag.count || 0);
}

function renderGrid(titel, zaehler) {
  const hatUnbekannt = AKKORD_TYPEN.some(({ key }) => zahlVon((zaehler[key] || {}).unbekannt) > 0);
  const tonartZeilen = hatUnbekannt ? [...GRUNDTOENE, 'unbekannt'] : GRUNDTOENE;

  const kopf = AKKORD_TYPEN.map(({ label }) => `<th style="text-align:center;">${label}</th>`).join('');

  const zeilen = tonartZeilen.map(gt => {
    const zellen = AKKORD_TYPEN.map(({ key }) => {
      const n = zahlVon((zaehler[key] || {})[gt]);
      const stil = n > 0 ? 'font-weight:600;color:var(--text);' : 'color:var(--text3);';
      return `<td style="text-align:center;${stil}">${n > 0 ? n : '–'}</td>`;
    }).join('');
    const label = gt === 'unbekannt'
      ? '<span style="font-style:italic;color:var(--text3);" title="Übungen von vor der Tonart-Erfassung">unbekannt</span>'
      : gt;
    return `<tr><td style="font-weight:600;white-space:nowrap;">${label}</td>${zellen}</tr>`;
  }).join('');

  const summen = AKKORD_TYPEN.map(({ key }) => {
    const summe = tonartZeilen.reduce((s, gt) => s + zahlVon((zaehler[key] || {})[gt]), 0);
    return `<td style="text-align:center;font-weight:700;color:var(--accent);">${summe}</td>`;
  }).join('');

  return `
    <h3 style="margin:2rem 0 0.75rem;">${titel}</h3>
    <div class="verlauf-wrap">
      <table class="verlauf-table">
        <thead><tr><th>Tonart</th>${kopf}</tr></thead>
        <tbody>
          ${zeilen}
          <tr><td style="font-weight:700;">Gesamt</td>${summen}</tr>
        </tbody>
      </table>
    </div>`;
}

function renderVerlauf(geuebt = null, proGeuebt = null) {
  const panel = document.getElementById('verlauf-panel');

  if (!geuebt)    try { geuebt    = JSON.parse(localStorage.getItem('gitueben_geuebt')     || '{}'); } catch(e) { geuebt = {}; }
  if (!proGeuebt) try { proGeuebt = JSON.parse(localStorage.getItem('gitueben_pro_geuebt') || '{}'); } catch(e) { proGeuebt = {}; }

  panel.innerHTML = renderGrid('Geübt', geuebt) + renderGrid('Geübt Pro', proGeuebt);
}

// Zählt pro Typ+Tonart den höheren Stand von zwei Ständen (lokal vs. Sheet).
// Nötig weil der Geübt-Sync im Bandit asynchron läuft und beim Seitenwechsel
// abgebrochen werden kann – ein noch nicht hochgeladener lokaler Klick darf
// dann nicht durch den älteren Sheet-Stand überschrieben werden.
function mergeZaehler(local, remote) {
  const out = {};
  const typen = new Set([...Object.keys(local), ...Object.keys(remote)]);
  typen.forEach(typ => {
    const l = local[typ] || {};
    const r = remote[typ] || {};
    const merged = { ...r };
    Object.keys(l).forEach(gt => {
      const lc = zahlVon(l[gt]);
      const rc = zahlVon(r[gt]);
      merged[gt] = lc >= rc ? l[gt] : r[gt];
    });
    out[typ] = merged;
  });
  return out;
}

// Trägt jeden Eintrag, der lokal höher steht als im Sheet, dort einzeln nach.
function aktualisiereAbweichende(zaehlerName, merged, remote) {
  Object.keys(merged).forEach(typ => {
    Object.keys(merged[typ]).forEach(gt => {
      const mergedEintrag = merged[typ][gt];
      const mergedCount   = zahlVon(mergedEintrag);
      const remoteCount   = zahlVon((remote[typ] || {})[gt]);
      if (mergedCount > remoteCount) {
        const zeit = (typeof mergedEintrag === 'object' && mergedEintrag.zeit) || '';
        SheetAPI.speichereEintrag(zaehlerName, typ, gt, mergedCount, zeit);
      }
    });
  });
}

window.addEventListener('pageshow', () => {
  migrateAltesDaten();
  migriereZuGrundtonFormat();
  renderVerlauf(); // sofort mit localStorage zeigen
  SheetAPI.load().then(data => {
    let localGeuebt = {}, localProGeuebt = {};
    try { localGeuebt    = JSON.parse(localStorage.getItem('gitueben_geuebt')     || '{}'); } catch(e) {}
    try { localProGeuebt = JSON.parse(localStorage.getItem('gitueben_pro_geuebt') || '{}'); } catch(e) {}

    const geuebt    = mergeZaehler(localGeuebt,    data.geuebt    || {});
    const proGeuebt = mergeZaehler(localProGeuebt, data.proGeuebt || {});

    localStorage.setItem('gitueben_geuebt',     JSON.stringify(geuebt));
    localStorage.setItem('gitueben_pro_geuebt', JSON.stringify(proGeuebt));
    renderVerlauf(geuebt, proGeuebt);

    aktualisiereAbweichende('geuebt', geuebt, data.geuebt || {});
    aktualisiereAbweichende('proGeuebt', proGeuebt, data.proGeuebt || {});
  });
});
</script>
</body>
</html>
