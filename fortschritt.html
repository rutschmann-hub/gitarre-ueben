<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fortschritt – Gitarrenübungen</title>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <link rel="stylesheet" href="assets/style.css">
  <style>
    .tabs {
      display: flex;
      gap: 0.3rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 1.5rem;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .tabs::-webkit-scrollbar { display: none; }

    .tab-btn {
      flex-shrink: 0;
      padding: 0.45rem 1rem;
      border: none;
      border-bottom: 2px solid transparent;
      background: transparent;
      font-family: 'DM Mono', monospace;
      font-size: 0.82rem;
      color: var(--text2);
      cursor: pointer;
      transition: color var(--transition), border-color var(--transition);
      margin-bottom: -1px;
    }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.aktiv {
      color: var(--accent);
      border-bottom-color: var(--accent);
      font-weight: 500;
    }

    .tab-panel { display: none; }
    .tab-panel.aktiv { display: block; }

    .combo-table-wrap {
      overflow-x: auto;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
    }

    .combo-table {
      width: 100%;
      border-collapse: collapse;
    }

    .combo-table thead th {
      padding: 0.5rem 0.6rem;
      text-align: left;
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      color: var(--text3);
      border-bottom: 1px solid var(--border2);
      background: var(--surface2);
      white-space: nowrap;
      font-weight: 500;
    }

    .combo-table thead th.th-cb { width: 2rem; text-align: center; }
    .combo-table thead th.th-nr { width: 2rem; text-align: center; }
    .combo-table thead th.th-zif { width: 6.5rem; }
    .combo-table thead th.th-pf  { width: 11rem; }
    .combo-table thead th.th-zeit { width: 6rem; }

    th[data-sort] {
      cursor: pointer;
      user-select: none;
    }
    th[data-sort]:hover { color: var(--text2); }

    .combo-table tbody tr { transition: background 0.1s; }
    .combo-table tbody tr:hover td {
      background: color-mix(in srgb, var(--surface2) 60%, transparent);
    }

    .combo-table tbody td {
      padding: 0.16rem 0.6rem;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
      font-family: 'DM Mono', monospace;
      font-size: 0.86rem;
      font-weight: 500;
      color: var(--text2);
    }

    .combo-table tbody tr:last-child td { border-bottom: none; }

    .td-cb { text-align: center; padding: 0.16rem 0.2rem; }

    .td-nr {
      text-align: center;
      font-size: 0.67rem;
      font-weight: 400;
      color: var(--text3);
      user-select: none;
      padding: 0.16rem 0.3rem;
    }

    .td-zeit {
      font-size: 0.72rem;
      font-weight: 400;
      color: var(--text3);
      white-space: nowrap;
    }

    .combo-cb {
      width: 1rem;
      height: 1rem;
      accent-color: var(--accent2);
      cursor: pointer;
    }

    tr.erledigt .td-zif,
    tr.erledigt .td-pf  { color: var(--text3); text-decoration: line-through; }
    tr.erledigt .td-nr  { color: var(--accent2); }
    tr.erledigt .td-zeit { color: var(--accent2); }
  </style>
</head>
<body>

<header class="app-header">
  <div class="app-header-inner">
    <a class="back-btn" href="index.html">← Übersicht</a>
    <span class="header-title">Fortschritt</span>
    <div style="display:flex;gap:4px;align-items:center">
      <a class="btn btn-ghost btn-sm" href="akkord-bandit.html">🎲 Bandit</a>
      <a class="btn btn-ghost btn-sm" href="akkord-bandit-pro.html">🎯 Pro</a>
      <a class="btn btn-ghost btn-sm" style="opacity:0.45;pointer-events:none">✅ Fortschritt</a>
    </div>

</header>

<main class="main">
  <div class="container" style="max-width:720px">

    <div class="page-hero">
      <h1 class="page-hero-title">Alle Kombinationen</h1>
      <p class="page-hero-subtitle">576 Kombinationen pro Akkordtyp – 24 Ziffernfolgen × 24 Pfeilfolgen</p>
      <div style="margin-top:1rem">
        <button class="btn btn-primary" id="btn-abschliessen" onclick="abschliessenUndNeuStarten()">Abschließen &amp; Neu starten</button>
      </div>

    <div class="tabs" id="tabs">
      <button class="tab-btn aktiv" data-tab="dom7">Dom 7</button>
      <button class="tab-btn" data-tab="maj7">Maj 7</button>
      <button class="tab-btn" data-tab="moll7">Moll 7</button>
      <button class="tab-btn" data-tab="moll7b5">Moll 7/b5</button>
      <button class="tab-btn" data-tab="verlauf">Verlauf</button>
    </div>

    <div id="tabPanels"></div>
    <div id="panel-verlauf" class="tab-panel"></div>

  </div>
</main>

<script src="assets/github-api.js"></script>
<script>
const STORAGE_KEY = 'gitueben_fortschritt';

const AKKORD_TYPEN = [
  { key: 'dom7',    label: 'Dom 7'      },
  { key: 'maj7',    label: 'Maj 7'      },
  { key: 'moll7',   label: 'Moll 7'    },
  { key: 'moll7b5', label: 'Moll 7/b5' },
];

function allePerms(arr) {
  const res = [];
  (function p(a, cur) {
    if (!a.length) { res.push([...cur]); return; }
    a.forEach((v, i) => { const r = [...a]; r.splice(i, 1); p(r, [...cur, v]); });
  })(arr, []);
  return res;
}

const ZIFFERN_PERMS = allePerms(['1','3','5','7']).map(p => p.join(' '));
const PFEILE_PERMS  = allePerms(['↑↑','↓↓','↑↓','↓↑']).map(p => p.join(' '));

let daten = {};
function leereDaten() {
  AKKORD_TYPEN.forEach(({ key }) => {
    daten[key] = Array.from({ length: 576 }, () => ({ count: 0, zeit: '' }));
  });
}

function wendeGitHubDatenAn(fortschrittObj) {
  AKKORD_TYPEN.forEach(({ key }) => {
    const arr = fortschrittObj[key];
    if (!Array.isArray(arr)) return;
    arr.forEach((v, i) => {
      if (i >= 576) return;
      const c = typeof v === 'boolean' ? (v ? 1 : 0)
              : (typeof v?.count === 'number' ? v.count : (v?.done ? 1 : 0));
      daten[key][i] = { count: c, zeit: v?.zeit || '' };
    });
  });
}

function laden() {
  leereDaten();
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const saved = JSON.parse(raw);
    AKKORD_TYPEN.forEach(({ key }) => {
      if (!Array.isArray(saved[key])) return;
      saved[key].forEach((v, i) => {
        if (i >= 576) return;
        if (typeof v === 'boolean') {
          daten[key][i] = { count: v ? 1 : 0, zeit: '' };
        } else if (v && typeof v === 'object') {
          const c = typeof v.count === 'number' ? v.count : (v.done ? 1 : 0);
          daten[key][i] = { count: c, zeit: v.zeit || '' };
        }
      });
    });
  } catch(e) {}
}

function speichernLokal() {
  const out = {};
  AKKORD_TYPEN.forEach(({ key }) => { out[key] = daten[key]; });
  localStorage.setItem(STORAGE_KEY, JSON.stringify(out));
}

let progressCache = null;
let saveTimer     = null;

async function syncZuGitHub() {
  if (!GitHubAPI.getToken()) return;
  if (!progressCache) progressCache = await GitHubAPI.load();
  const out = {};
  AKKORD_TYPEN.forEach(({ key }) => { out[key] = daten[key]; });
  progressCache.fortschritt = out;
  await GitHubAPI.save(progressCache);
}

function speichern() {
  speichernLokal();
  clearTimeout(saveTimer);
  saveTimer = setTimeout(syncZuGitHub, 2500);
}

function countDone(key) {
  return daten[key].reduce((s, v) => s + (v.count > 0 ? 1 : 0), 0);
}

function countTotal(key) {
  return daten[key].reduce((s, v) => s + (v.count || 0), 0);
}

function zeitstempel() {
  const d = new Date();
  return `${String(d.getDate()).padStart(2,'0')}.${String(d.getMonth()+1).padStart(2,'0')}. ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

const STARTDATEN_KEY = 'gitueben_fortschritt_start';
function getStartDaten() {
  try { return JSON.parse(localStorage.getItem(STARTDATEN_KEY)) || {}; } catch(e) { return {}; }
}
function setStartDatum(key) {
  const sd = getStartDaten();
  if (!sd[key]) {
    const h = new Date();
    sd[key] = `${String(h.getDate()).padStart(2,'0')}.${String(h.getMonth()+1).padStart(2,'0')}.${h.getFullYear()}`;
    localStorage.setItem(STARTDATEN_KEY, JSON.stringify(sd));
  }
}

function updateProgress(key) {
  const done  = countDone(key);
  const pct   = Math.round((done / 576) * 100);
  const bar   = document.getElementById(`bar-${key}`);
  const label = document.getElementById(`label-${key}`);
  if (bar)   bar.style.width = pct + '%';
  if (label) label.textContent = `${done} / 576 (${pct} %)`;
}

// ── Sort state ───────────────────────────────────────────
let sortCol = null; // null | 'ziffern' | 'zeit'
let sortDir = 1;    // 1 = aufsteigend, -1 = absteigend
let activeTab = 'dom7';

function getSortedOrder(key) {
  const indices = Array.from({ length: 576 }, (_, i) => i);
  if (!sortCol) return indices;
  return indices.sort((a, b) => {
    let va, vb;
    if (sortCol === 'ziffern') {
      va = ZIFFERN_PERMS[Math.floor(a / 24)];
      vb = ZIFFERN_PERMS[Math.floor(b / 24)];
    } else {
      va = daten[key][a].zeit || '￿';
      vb = daten[key][b].zeit || '￿';
    }
    if (va < vb) return -sortDir;
    if (va > vb) return  sortDir;
    return 0;
  });
}

// ── Render ───────────────────────────────────────────────
function renderPanels() {
  const container = document.getElementById('tabPanels');
  container.innerHTML = '';

  AKKORD_TYPEN.forEach(({ key, label }) => {
    const panel = document.createElement('div');
    panel.className = 'tab-panel' + (key === activeTab ? ' aktiv' : '');
    panel.id = `panel-${key}`;

    const done = countDone(key);
    const pct  = Math.round((done / 576) * 100);
    panel.innerHTML = `
      <div style="display:flex;align-items:center;gap:0.75rem;margin-bottom:1rem;">
        <div class="progress-bar" style="flex:1">
          <div class="progress-bar-fill" id="bar-${key}" style="width:${pct}%"></div>
        </div>
        <span id="label-${key}" style="font-family:'DM Mono',monospace;font-size:0.72rem;color:var(--text2);white-space:nowrap;min-width:6.5rem;text-align:right;">${done} / 576 (${pct} %)</span>
      </div>
    `;

    const wrap  = document.createElement('div');
    wrap.className = 'combo-table-wrap';

    const table = document.createElement('table');
    table.className = 'combo-table';

    const indZ = sortCol === 'ziffern' ? (sortDir === 1 ? ' ▲' : ' ▼') : '';
    const indT = sortCol === 'zeit'    ? (sortDir === 1 ? ' ▲' : ' ▼') : '';

    table.innerHTML = `
      <thead>
        <tr>
          <th class="th-cb">✓</th>
          <th class="th-nr">#</th>
          <th class="th-zif" data-sort="ziffern">Ziffernfolge${indZ}</th>
          <th class="th-pf">Pfeilfolge</th>
          <th class="th-zeit" data-sort="zeit">Zuletzt${indT}</th>
        </tr>
      </thead>
    `;

    const tbody  = document.createElement('tbody');
    const order  = getSortedOrder(key);

    order.forEach((originalIdx, displayPos) => {
      const entry = daten[key][originalIdx];
      const z     = Math.floor(originalIdx / 24);
      const pf    = originalIdx % 24;

      const tr = document.createElement('tr');
      tr.id = `r-${key}-${originalIdx}`;
      if (entry.count > 0) tr.classList.add('erledigt');

      const tdCb = document.createElement('td');
      tdCb.className = 'td-cb';
      const cb = document.createElement('input');
      cb.type = 'checkbox'; cb.className = 'combo-cb';
      cb.checked = entry.count > 0;
      cb.dataset.key = key; cb.dataset.idx = originalIdx;
      tdCb.appendChild(cb);
      tr.appendChild(tdCb);

      const tdNr = document.createElement('td');
      tdNr.className = 'td-nr';
      tdNr.textContent = displayPos + 1;
      tr.appendChild(tdNr);

      const tdZ = document.createElement('td');
      tdZ.className = 'td-zif'; tdZ.textContent = ZIFFERN_PERMS[z];
      tr.appendChild(tdZ);

      const tdP = document.createElement('td');
      tdP.className = 'td-pf'; tdP.textContent = PFEILE_PERMS[pf];
      tr.appendChild(tdP);

      const tdZeit = document.createElement('td');
      tdZeit.className = 'td-zeit';
      tdZeit.id = `zeit-${key}-${originalIdx}`;
      tdZeit.textContent = entry.count > 1
        ? `${entry.count}× · ${entry.zeit}`
        : entry.zeit;
      tr.appendChild(tdZeit);

      tbody.appendChild(tr);
    });

    table.appendChild(tbody);
    wrap.appendChild(table);
    panel.appendChild(wrap);
    container.appendChild(panel);
  });
}

// ── Event delegation ─────────────────────────────────────
document.getElementById('tabPanels').addEventListener('change', e => {
  if (!e.target.matches('.combo-cb')) return;
  const { key, idx } = e.target.dataset;
  const i = +idx;
  if (e.target.checked) {
    if (daten[key][i].count === 0) {
      if (countTotal(key) === 0) setStartDatum(key);
      daten[key][i].count = 1;
      daten[key][i].zeit  = zeitstempel();
      const zeitEl = document.getElementById(`zeit-${key}-${i}`);
      if (zeitEl) zeitEl.textContent = daten[key][i].zeit;
    }
  } else {
    daten[key][i].count = 0;
    daten[key][i].zeit  = '';
    const zeitEl = document.getElementById(`zeit-${key}-${i}`);
    if (zeitEl) zeitEl.textContent = '';
  }
  document.getElementById(`r-${key}-${i}`)?.classList.toggle('erledigt', daten[key][i].count > 0);
  updateProgress(key);
  speichern();
});

document.getElementById('tabPanels').addEventListener('click', e => {
  // Sortierung
  const th = e.target.closest('th[data-sort]');
  if (th) {
    const col = th.dataset.sort;
    if (sortCol === col) sortDir *= -1;
    else { sortCol = col; sortDir = 1; }
    renderPanels();
    return;
  }

});

// ── Tabs ─────────────────────────────────────────────────
document.getElementById('tabs').addEventListener('click', e => {
  const btn = e.target.closest('.tab-btn');
  if (!btn) return;
  activeTab = btn.dataset.tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('aktiv', b === btn));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('aktiv', p.id === `panel-${activeTab}`));
  if (activeTab === 'verlauf') ladeUndZeigeVerlauf();
});

window.addEventListener('pageshow', async () => {
  // Sofort lokal anzeigen
  laden();
  renderPanels();

  // Verlauf-Cache sofort aus localStorage vorab befüllen (kein Netzwerk nötig)
  if (!archivDaten) {
    try {
      const c = localStorage.getItem('gitueben_archiv');
      if (c) archivDaten = JSON.parse(c).data || { durchlaeufe: [] };
    } catch(e) {}
  }

  if (GitHubAPI.getToken()) {
    try {
      if (GitHubAPI.isDirty()) {
        // Lokale Änderungen sind noch nicht gespeichert → zuerst hochladen,
        // nicht mit möglicherweise älteren GitHub-Daten überschreiben
        await syncZuGitHub();
      } else {
        // Keine ausstehenden Änderungen → GitHub-Stand holen (anderes Gerät?)
        progressCache = await GitHubAPI.load();
        if (progressCache.fortschritt && Object.keys(progressCache.fortschritt).length) {
          leereDaten();
          wendeGitHubDatenAn(progressCache.fortschritt);
          speichernLokal();
          renderPanels();
        }
      }
    } catch(e) {}
  }
});

// Wenn Gerät wieder online kommt: ausstehende Änderungen synchronisieren
window.addEventListener('online', () => {
  GitHubAPI.syncPending();
});

// ── Archiv API ────────────────────────────────────────────
const ArchivAPI = (() => {
  const OWNER = 'rutschmann-hub';
  const REPO  = 'gitarre-ueben';
  const FILE  = 'data/archiv.json';
  const API   = 'https://api.github.com';
  const CACHE = 'gitueben_archiv';

  const token  = () => localStorage.getItem('gh_token');
  const hdrs   = () => {
    const h = { Accept: 'application/vnd.github.v3+json' };
    if (token()) h.Authorization = `token ${token()}`;
    return h;
  };
  const b64d = s => { const b = atob(s.replace(/\s/g,'')); const a = new Uint8Array(b.length); for(let i=0;i<b.length;i++) a[i]=b.charCodeAt(i); return new TextDecoder().decode(a); };
  const b64e = s => { const a = new TextEncoder().encode(s); let r=''; a.forEach(x=>r+=String.fromCharCode(x)); return btoa(r); };

  async function laden() {
    try {
      const r = await fetch(`${API}/repos/${OWNER}/${REPO}/contents/${FILE}`, { headers: hdrs() });
      if (r.status === 404) {
        const c = localStorage.getItem(CACHE);
        return c ? JSON.parse(c).data : { durchlaeufe: [] };
      }
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      const d = await r.json();
      const content = JSON.parse(b64d(d.content));
      localStorage.setItem(CACHE, JSON.stringify({ sha: d.sha, data: content }));
      return content;
    } catch(e) {
      const c = localStorage.getItem(CACHE);
      return c ? JSON.parse(c).data : { durchlaeufe: [] };
    }
  }

  async function hinzufuegen(eintrag) {
    if (!token()) return { ok: false, reason: 'no_token' };
    let sha = null, current = { durchlaeufe: [] };
    try {
      const r = await fetch(`${API}/repos/${OWNER}/${REPO}/contents/${FILE}`, { headers: hdrs() });
      if (r.ok) {
        const d = await r.json(); sha = d.sha; current = JSON.parse(b64d(d.content));
      } else {
        // 404 = neue Datei; alle anderen Status → aus Cache laden (Einträge erhalten)
        const c = localStorage.getItem(CACHE);
        if (c) {
          const cached = JSON.parse(c);
          current = cached.data || { durchlaeufe: [] };
          if (r.status !== 404) sha = cached.sha || null; // gecachte SHA für vorhandene Datei
        }
      }
    } catch(e) {
      const c = localStorage.getItem(CACHE);
      if (c) {
        const cached = JSON.parse(c);
        current = cached.data || { durchlaeufe: [] };
        sha = cached.sha || null; // gecachte SHA als Fallback bei Netzwerkfehler
      }
    }
    current.durchlaeufe.push(eintrag);
    const body = { message: 'chore: Durchlauf archiviert', content: b64e(JSON.stringify(current, null, 2)) };
    if (sha) body.sha = sha;
    try {
      const r = await fetch(`${API}/repos/${OWNER}/${REPO}/contents/${FILE}`, {
        method: 'PUT',
        headers: { ...hdrs(), 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      if (!r.ok) { const err = await r.json().catch(()=>({})); throw new Error(err.message || `HTTP ${r.status}`); }
      const result = await r.json();
      localStorage.setItem(CACHE, JSON.stringify({ sha: result.content.sha, data: current }));
      return { ok: true };
    } catch(e) {
      return { ok: false, reason: e.message };
    }
  }

  return { laden, hinzufuegen, hatToken: () => !!token() };
})();

// ── Verlauf ───────────────────────────────────────────────
let archivDaten = null;

async function ladeUndZeigeVerlauf() {
  const panel = document.getElementById('panel-verlauf');
  if (!panel) return;

  // Sofort aus localStorage-Cache rendern (kein Netzwerk nötig)
  if (!archivDaten) {
    try {
      const c = localStorage.getItem('gitueben_archiv');
      archivDaten = c ? (JSON.parse(c).data || { durchlaeufe: [] }) : { durchlaeufe: [] };
    } catch(e) { archivDaten = { durchlaeufe: [] }; }
  }
  renderVerlaufPanel();

  // Im Hintergrund von GitHub aktualisieren
  const fresh = await ArchivAPI.laden();
  if (fresh && Array.isArray(fresh.durchlaeufe)) {
    archivDaten = fresh;
    renderVerlaufPanel();
  }
}

function renderVerlaufPanel() {
  const panel = document.getElementById('panel-verlauf');
  if (!panel) return;
  const ZIEL       = 1000;
  const startDaten = getStartDaten();

  // Pro-Zähler direkt aus localStorage (kein Archivierungsschritt nötig)
  let proGeuebt = {};
  try { proGeuebt = JSON.parse(localStorage.getItem('gitueben_pro_geuebt') || '{}'); } catch(e) {}

  const rows = AKKORD_TYPEN.map(({ key, label }) => {
    let total = 0, letztesDatum = null;

    // Archiv-Einträge aufsummieren
    if (archivDaten) {
      archivDaten.durchlaeufe.forEach(d => {
        const raw = d[key] ?? 0;
        const t   = typeof raw === 'object' ? (raw.total ?? raw.unique ?? 0) : raw;
        total += t;
        if (t > 0) letztesDatum = d.datum; // letzter Archiv-Eintrag mit Übungen dieses Typs
      });
    }

    // Aktueller Durchlauf
    const curr = countTotal(key);
    total += curr;
    // Aktiver Durchlauf ist immer aktueller als Archiv → direkt überschreiben
    if (curr > 0) {
      let latestZeit = null;
      daten[key].forEach(e => {
        if (e.count > 0 && e.zeit && (!latestZeit || e.zeit > latestZeit)) latestZeit = e.zeit;
      });
      if (latestZeit) letztesDatum = latestZeit;
    }

    const pct    = Math.min(Math.round((total / ZIEL) * 100), 100);
    const farbe  = total >= ZIEL ? 'var(--accent2)' : 'var(--accent)';
    const txtCol = total >= ZIEL ? 'var(--accent2)' : 'var(--text2)';
    const pro    = proGeuebt[key] || 0;

    return `<tr>
      <td style="font-family:'DM Mono',monospace;font-size:0.88rem;font-weight:600;color:var(--text);padding:0.7rem 0.75rem;white-space:nowrap;">${label}</td>
      <td style="font-family:'DM Mono',monospace;font-size:0.75rem;color:var(--text3);padding:0.7rem 0.75rem;white-space:nowrap;">${letztesDatum || '–'}</td>
      <td style="padding:0.7rem 0.75rem;min-width:220px;">
        <div style="font-family:'DM Mono',monospace;font-size:0.88rem;font-weight:600;color:${txtCol};margin-bottom:6px;">${total} / ${ZIEL}</div>
        <div style="height:7px;background:var(--border);border-radius:4px;overflow:hidden;">
          <div style="height:100%;width:${pct}%;background:${farbe};border-radius:4px;transition:width 0.4s ease;"></div>
        </div>
      </td>
      <td style="font-family:'DM Mono',monospace;font-size:0.88rem;font-weight:600;color:var(--accent);padding:0.7rem 0.75rem;text-align:center;">${pro > 0 ? pro : '–'}</td>
    </tr>`;
  }).join('');

  panel.innerHTML = `
    <div class="combo-table-wrap">
      <table class="combo-table">
        <thead><tr>
          <th style="white-space:nowrap">Akkordtyp</th>
          <th style="white-space:nowrap">Letzte Übung</th>
          <th>Geübt</th>
          <th style="white-space:nowrap">Geübt Pro</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}

// ── Abschließen & Neu starten ─────────────────────────────
async function abschliessenUndNeuStarten() {
  const gesamtTotal = AKKORD_TYPEN.reduce((s, {key}) => s + countTotal(key), 0);
  if (gesamtTotal === 0) { alert('Es sind noch keine Kombinationen geübt worden.'); return; }
  if (!confirm('Aktuellen Fortschritt archivieren und alle vier Akkordtypen zurücksetzen?')) return;

  const heute = new Date();
  const datum = `${String(heute.getDate()).padStart(2,'0')}.${String(heute.getMonth()+1).padStart(2,'0')}.${heute.getFullYear()}`;
  const eintrag = { datum };
  const startDaten = getStartDaten();
  AKKORD_TYPEN.forEach(({ key }) => {
    eintrag[key] = { unique: countDone(key), total: countTotal(key), start: startDaten[key] || datum };
  });

  const btn = document.getElementById('btn-abschliessen');
  btn.disabled = true;
  btn.textContent = '⟳ Speichert…';

  if (ArchivAPI.hatToken()) {
    const result = await ArchivAPI.hinzufuegen(eintrag);
    btn.disabled = false;
    btn.textContent = 'Abschließen & Neu starten';
    if (!result.ok) { alert(`Archivierung fehlgeschlagen: ${result.reason}`); return; }
  } else {
    // Lokal zwischenspeichern
    const c = localStorage.getItem('gitueben_archiv');
    const archiv = c ? JSON.parse(c).data : { durchlaeufe: [] };
    archiv.durchlaeufe.push(eintrag);
    localStorage.setItem('gitueben_archiv', JSON.stringify({ sha: null, data: archiv }));
    archivDaten = archiv;
    btn.disabled = false;
    btn.textContent = 'Abschließen & Neu starten';
  }

  // Zurücksetzen
  AKKORD_TYPEN.forEach(({ key }) => {
    daten[key] = Array.from({ length: 576 }, () => ({ count: 0, zeit: '' }));
  });
  localStorage.removeItem(STARTDATEN_KEY);
  speichern();
  renderPanels();

  // Zum Verlauf-Tab wechseln
  activeTab = 'verlauf';
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('aktiv', b.dataset.tab === 'verlauf'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('aktiv', p.id === 'panel-verlauf'));
  ladeUndZeigeVerlauf();
}
</script>
