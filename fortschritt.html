<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fortschritt – Gitarrenübungen</title>
  <link rel="stylesheet" href="assets/style.css">
  <style>
    .tabs {
      display: flex;
      gap: 0.3rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 1.5rem;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .tabs::-webkit-scrollbar { display: none; }

    .tab-btn {
      flex-shrink: 0;
      padding: 0.45rem 1rem;
      border: none;
      border-bottom: 2px solid transparent;
      background: transparent;
      font-family: 'DM Mono', monospace;
      font-size: 0.82rem;
      color: var(--text2);
      cursor: pointer;
      transition: color var(--transition), border-color var(--transition);
      margin-bottom: -1px;
    }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.aktiv {
      color: var(--accent);
      border-bottom-color: var(--accent);
      font-weight: 500;
    }

    .tab-panel { display: none; }
    .tab-panel.aktiv { display: block; }

    .combo-table-wrap {
      overflow-x: auto;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
    }

    .combo-table {
      width: 100%;
      border-collapse: collapse;
    }

    .combo-table thead th {
      padding: 0.5rem 0.75rem;
      text-align: left;
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      color: var(--text3);
      border-bottom: 1px solid var(--border2);
      background: var(--surface2);
      white-space: nowrap;
      font-weight: 400;
    }

    .combo-table thead th.th-cb { width: 2.2rem; text-align: center; }
    .combo-table thead th.th-nr { width: 2.4rem; text-align: center; }
    .combo-table thead th.th-zeit { width: 7rem; }

    .combo-table tbody tr { transition: background 0.1s; }
    .combo-table tbody tr:hover td {
      background: color-mix(in srgb, var(--surface2) 60%, transparent);
    }

    .combo-table tbody td {
      padding: 0.14rem 0.5rem;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
      font-family: 'DM Mono', monospace;
      font-size: 0.8rem;
      color: var(--text2);
    }

    .combo-table tbody tr:last-child td { border-bottom: none; }

    .td-cb {
      text-align: center;
      padding: 0.14rem 0.2rem;
    }

    .td-nr {
      text-align: center;
      font-size: 0.67rem;
      color: var(--text3);
      user-select: none;
      padding: 0.14rem 0.3rem;
    }

    .td-zeit {
      font-size: 0.7rem;
      color: var(--text3);
      white-space: nowrap;
    }

    .combo-cb {
      width: 1rem;
      height: 1rem;
      accent-color: var(--accent2);
      cursor: pointer;
    }

    tr.erledigt .td-zif,
    tr.erledigt .td-pf {
      color: var(--text3);
      text-decoration: line-through;
    }
    tr.erledigt .td-nr { color: var(--accent2); }
    tr.erledigt .td-zeit { color: var(--accent2); }
  </style>
</head>
<body>

<header class="app-header">
  <div class="app-header-inner">
    <a class="back-btn" href="index.html">← Übersicht</a>
    <span class="header-title">Fortschritt</span>
    <a class="btn btn-ghost btn-sm" href="akkord-bandit.html">🎲 Akkord Bandit</a>
  </div>
</header>

<main class="main">
  <div class="container" style="max-width:900px">

    <div class="page-hero">
      <h1 class="page-hero-title">Alle Kombinationen</h1>
      <p class="page-hero-subtitle">576 Kombinationen pro Akkordtyp – 24 Ziffernfolgen × 24 Pfeilfolgen</p>
    </div>

    <div class="tabs" id="tabs">
      <button class="tab-btn aktiv" data-tab="dom7">Dom 7</button>
      <button class="tab-btn" data-tab="maj7">Maj 7</button>
      <button class="tab-btn" data-tab="moll7">Moll 7</button>
      <button class="tab-btn" data-tab="moll7b5">Moll 7/b5</button>
    </div>

    <div id="tabPanels"></div>

  </div>
</main>

<script>
const STORAGE_KEY = 'gitueben_fortschritt';

const AKKORD_TYPEN = [
  { key: 'dom7',    label: 'Dom 7'      },
  { key: 'maj7',    label: 'Maj 7'      },
  { key: 'moll7',   label: 'Moll 7'    },
  { key: 'moll7b5', label: 'Moll 7/b5' },
];

function allePerms(arr) {
  const res = [];
  (function p(a, cur) {
    if (!a.length) { res.push([...cur]); return; }
    a.forEach((v, i) => { const r = [...a]; r.splice(i, 1); p(r, [...cur, v]); });
  })(arr, []);
  return res;
}

const ZIFFERN_PERMS = allePerms(['1','3','5','7']).map(p => p.join(' '));
const PFEILE_PERMS  = allePerms(['↑↑','↓↓','↑↓','↓↑']).map(p => p.join(' '));

// daten[key][idx] = { done: bool, zeit: string }
let daten = {};
function leereDaten() {
  AKKORD_TYPEN.forEach(({ key }) => {
    daten[key] = Array.from({ length: 576 }, () => ({ done: false, zeit: '' }));
  });
}

function laden() {
  leereDaten();
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const saved = JSON.parse(raw);
    AKKORD_TYPEN.forEach(({ key }) => {
      if (!Array.isArray(saved[key])) return;
      saved[key].forEach((v, i) => {
        if (i >= 576) return;
        if (typeof v === 'boolean') {
          daten[key][i] = { done: v, zeit: '' };
        } else if (v && typeof v === 'object') {
          daten[key][i] = { done: !!v.done, zeit: v.zeit || '' };
        }
      });
    });
  } catch(e) {}
}

function speichern() {
  const out = {};
  AKKORD_TYPEN.forEach(({ key }) => { out[key] = daten[key]; });
  localStorage.setItem(STORAGE_KEY, JSON.stringify(out));
}

function countDone(key) {
  return daten[key].reduce((s, v) => s + (v.done ? 1 : 0), 0);
}

function updateProgress(key) {
  const done  = countDone(key);
  const pct   = Math.round((done / 576) * 100);
  const bar   = document.getElementById(`bar-${key}`);
  const label = document.getElementById(`label-${key}`);
  if (bar)   bar.style.width = pct + '%';
  if (label) label.textContent = `${done} / 576 (${pct} %)`;
}

// ── Render ───────────────────────────────────────────────
function renderPanels() {
  const container = document.getElementById('tabPanels');
  container.innerHTML = '';

  AKKORD_TYPEN.forEach(({ key, label }, tabIdx) => {
    const panel = document.createElement('div');
    panel.className = 'tab-panel' + (tabIdx === 0 ? ' aktiv' : '');
    panel.id = `panel-${key}`;

    const done = countDone(key);
    const pct  = Math.round((done / 576) * 100);
    panel.innerHTML = `
      <div style="display:flex;align-items:center;gap:0.75rem;margin-bottom:1rem;">
        <div class="progress-bar" style="flex:1">
          <div class="progress-bar-fill" id="bar-${key}" style="width:${pct}%"></div>
        </div>
        <span id="label-${key}" style="font-family:'DM Mono',monospace;font-size:0.72rem;color:var(--text2);white-space:nowrap;min-width:6.5rem;text-align:right;">${done} / 576 (${pct} %)</span>
        <button class="btn btn-ghost btn-sm" data-resetkey="${key}">Zurücksetzen</button>
      </div>
    `;

    const wrap  = document.createElement('div');
    wrap.className = 'combo-table-wrap';

    const table = document.createElement('table');
    table.className = 'combo-table';
    table.innerHTML = `
      <thead>
        <tr>
          <th class="th-cb">✓</th>
          <th class="th-nr">#</th>
          <th>Ziffernfolge</th>
          <th>Pfeilfolge</th>
          <th class="th-zeit">Zuletzt</th>
        </tr>
      </thead>
    `;

    const tbody = document.createElement('tbody');
    let idx = 0;
    for (let z = 0; z < 24; z++) {
      for (let pf = 0; pf < 24; pf++, idx++) {
        const entry = daten[key][idx];
        const tr    = document.createElement('tr');
        tr.id = `r-${key}-${idx}`;
        if (entry.done) tr.classList.add('erledigt');

        const tdCb = document.createElement('td');
        tdCb.className = 'td-cb';
        const cb = document.createElement('input');
        cb.type = 'checkbox'; cb.className = 'combo-cb'; cb.checked = entry.done;
        cb.dataset.key = key; cb.dataset.idx = idx;
        tdCb.appendChild(cb);
        tr.appendChild(tdCb);

        const tdNr = document.createElement('td');
        tdNr.className = 'td-nr'; tdNr.textContent = idx + 1;
        tr.appendChild(tdNr);

        const tdZ = document.createElement('td');
        tdZ.className = 'td-zif'; tdZ.textContent = ZIFFERN_PERMS[z];
        tr.appendChild(tdZ);

        const tdP = document.createElement('td');
        tdP.className = 'td-pf'; tdP.textContent = PFEILE_PERMS[pf];
        tr.appendChild(tdP);

        const tdZeit = document.createElement('td');
        tdZeit.className = 'td-zeit';
        tdZeit.id = `zeit-${key}-${idx}`;
        tdZeit.textContent = entry.zeit;
        tr.appendChild(tdZeit);

        tbody.appendChild(tr);
      }
    }

    table.appendChild(tbody);
    wrap.appendChild(table);
    panel.appendChild(wrap);
    container.appendChild(panel);
  });
}

// ── Event delegation ─────────────────────────────────────
document.getElementById('tabPanels').addEventListener('change', e => {
  if (!e.target.matches('.combo-cb')) return;
  const { key, idx } = e.target.dataset;
  const i = +idx;
  daten[key][i].done = e.target.checked;
  if (!e.target.checked) {
    daten[key][i].zeit = '';
    const zeitEl = document.getElementById(`zeit-${key}-${i}`);
    if (zeitEl) zeitEl.textContent = '';
  }
  document.getElementById(`r-${key}-${i}`)?.classList.toggle('erledigt', e.target.checked);
  updateProgress(key);
  speichern();
});

document.getElementById('tabPanels').addEventListener('click', e => {
  const btn = e.target.closest('[data-resetkey]');
  if (!btn) return;
  const key = btn.dataset.resetkey;
  const typLabel = AKKORD_TYPEN.find(a => a.key === key)?.label;
  if (!confirm(`Alle 576 Einträge für "${typLabel}" zurücksetzen?`)) return;
  daten[key] = Array.from({ length: 576 }, () => ({ done: false, zeit: '' }));
  const panel = document.getElementById(`panel-${key}`);
  panel.querySelectorAll('.combo-cb').forEach(cb => { cb.checked = false; });
  panel.querySelectorAll('[id^="zeit-"]').forEach(td => { td.textContent = ''; });
  panel.querySelectorAll('tr[id]').forEach(tr => { tr.classList.remove('erledigt'); });
  updateProgress(key);
  speichern();
});

// ── Tabs ─────────────────────────────────────────────────
document.getElementById('tabs').addEventListener('click', e => {
  const btn = e.target.closest('.tab-btn');
  if (!btn) return;
  const key = btn.dataset.tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('aktiv', b === btn));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('aktiv', p.id === `panel-${key}`));
});

laden();
renderPanels();
</script>
</body>
</html>
