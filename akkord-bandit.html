<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Akkord Bandit – Gitarrenübungen</title>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <link rel="stylesheet" href="assets/style.css">
  <style>
    body { display: flex; flex-direction: column; min-height: 100vh; }

    .page-main {
      flex: 1;
      overflow-x: auto;
      display: flex;
      justify-content: center;
      padding: 0.75rem 1rem 1rem;
    }

    .bandit-wrap {
      width: 100%;
      max-width: 1330px;
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }
    .app-header-inner { max-width: 1330px; }
    /* Hauptinhalt links begrenzen, damit rechts Platz fürs Betonungs-Panel bleibt */
    .settings-bar, .griffbrett-widget-wrap, .akkord-name-display {
      align-self: flex-start; width: 100%; max-width: 1160px;
    }

    /* ─── Settings bar ─────────────────────────────────── */
    .settings-bar {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-wrap: wrap;
      padding: 0.9rem 1.25rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }

    .settings-sep {
      width: 1px;
      height: 1.8rem;
      background: var(--border2);
      flex-shrink: 0;
    }

    .settings-group {
      display: flex;
      align-items: center;
      gap: 0.7rem;
    }

    .section-label {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      white-space: nowrap;
    }

    select {
      font-family: 'DM Mono', monospace;
      font-size: 0.9rem;
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border2);
      border-radius: 6px;
      padding: 5px 10px;
      cursor: pointer;
      outline: none;
    }
    select:focus { border-color: var(--accent); }

    .akkord-buttons { display: flex; gap: 6px; flex-wrap: wrap; }

    .akk-btn {
      padding: 5px 16px;
      font-family: 'DM Mono', monospace;
      font-size: 0.88rem;
      font-weight: 500;
      cursor: pointer;
      border-radius: 4px;
      background: transparent;
      color: var(--text2);
      border: 1px solid var(--border2);
      transition: all 0.15s;
    }
    .akk-btn:hover { border-color: var(--accent); color: var(--accent); }
    .akk-btn.aktiv { background: var(--accent); color: #fff; border-color: var(--accent); }

    /* ─── Akkord name ──────────────────────────────────── */
    .akkord-name-display {
      font-family: 'Fraunces', serif;
      font-size: 1.6rem;
      font-weight: 600;
      color: var(--accent);
      min-height: 1.6rem;
      letter-spacing: -0.01em;
      text-align: center;
    }

    .raeder-wrap {
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    /* ─── Räder ────────────────────────────────────────── */
    .raeder-block {
      display: flex; flex-wrap: wrap; gap: 1.25rem;
      align-items: stretch; justify-content: flex-start; max-width: 1160px;
    }
    .rad-gruppe {
      display: flex; flex-direction: column; gap: 10px;
      background: #f0e7d3;
      border: 1.5px solid var(--border2);
      border-radius: 14px;
      padding: 0.9rem 1rem;
    }
    .rad-gruppe-titel {
      font-size: 0.82rem;
      font-weight: 700;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .raeder-reihe { display: flex; gap: 8px; }
    .rad-wrap { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .rad-lbl { font-size: 0.65rem; color: var(--text3); }

    .rad-fenster {
      width: 78px;
      height: 84px;
      border: 1.5px solid var(--border2);
      border-radius: 8px;
      overflow: hidden;
      position: relative;
      background: #fff;
    }
    .rad-strip {
      position: absolute;
      width: 100%;
      display: flex;
      flex-direction: column;
    }
    .rad-zelle {
      height: 84px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      color: var(--text);
    }
    .highlight {
      position: absolute;
      inset: 0;
      border: 2.5px solid var(--accent);
      border-radius: 8px;
      pointer-events: none;
      z-index: 10;
      box-shadow: inset 0 0 14px rgba(139,94,60,0.08);
    }

    /* ─── Ton-Pills ────────────────────────────────────── */
    .ton-pills-reihe { display: flex; gap: 8px; justify-content: center; width: 100%; }
    .ton-pill {
      width: 78px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 5px 6px;
      transition: all 0.2s;
    }
    .ton-pill.leer { background: transparent; border-color: transparent; }
    .ton-name { font-size: 16px; font-weight: 500; color: var(--accent); }
    .ton-funktion { font-size: 11px; color: var(--text3); }

    .trennlinie {
      width: 1px;
      background: var(--border);
      align-self: stretch;
      margin: 0 0.75rem;
    }

    /* ─── Notations-Kästchen (Pfeile pro) ──────────────── */
    .notation-reihe { display: flex; gap: 8px; margin-top: 6px; }
    .notation-box {
      width: 78px; height: 54px; border: 1.5px solid var(--border2);
      border-radius: 8px; background: var(--surface); display: flex;
      align-items: center; justify-content: center; color: var(--text);
      overflow: hidden; flex-shrink: 0;
    }
    .notation-box.leer { border-style: dashed; opacity: 0.3; }

    /* ─── Silben-Kästchen (Pfeile pro) ─────────────────── */
    .silben-reihe { display: flex; gap: 8px; margin-top: 4px; }
    .silben-box {
      width: 78px; min-height: 34px; border: 1.5px solid var(--border2);
      border-radius: 8px; background: var(--surface2); display: flex;
      align-items: center; justify-content: center; flex-shrink: 0;
      font-size: 0.7rem; font-family: 'DM Mono', monospace; color: var(--text2);
      text-align: center; padding: 4px 5px; line-height: 1.3;
    }
    .silben-box.leer { border-style: dashed; opacity: 0.3; }
    @font-face {
      font-family: 'Bravura';
      src: url('assets/fonts/music-rests.woff2') format('woff2');
      font-display: swap;
    }
    .nrest { font-family: 'Bravura', 'Apple Symbols', 'Segoe UI Symbol', serif; }
    .pro-badge { font-size: 0.65rem; color: var(--accent); letter-spacing: 0; }

    /* ─── Buttons ──────────────────────────────────────── */
    .drehen-btn {
      padding: 10px 26px;
      font-family: 'DM Mono', monospace;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      border-radius: 6px;
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border2);
      transition: all 0.15s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }
    .drehen-btn:hover  { border-color: var(--accent); color: var(--accent); background: var(--surface); }
    .drehen-btn:active { transform: scale(0.97); }
    .drehen-btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }
    .drehen-btn.beide  { border-color: var(--accent); color: var(--accent); }
    .drehen-btn.beide:hover { background: var(--accent); color: #fff; }

    .start-buttons { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; justify-content: center; width: 100%; }
    .start-btn {
      padding: 6px 14px;
      font-family: 'DM Mono', monospace;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      border-radius: 4px;
      background: transparent;
      color: var(--text2);
      border: 1px solid var(--border2);
      transition: all 0.15s;
    }
    .start-btn:hover { border-color: var(--accent); color: var(--accent); }
    .start-btn.aktiv { background: var(--accent); color: #fff; border-color: var(--accent); }
    .start-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    .reset-btn {
      padding: 6px 10px;
      font-family: 'DM Mono', monospace;
      font-size: 0.88rem;
      cursor: pointer;
      border-radius: 4px;
      background: transparent;
      color: var(--text3);
      border: 1px solid var(--border);
      transition: all 0.15s;
      margin-left: 2px;
    }
    .reset-btn:hover { border-color: var(--accent2); color: var(--accent2); }
    .reset-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    /* ─── Zähler ───────────────────────────────────────── */
    .zaehler-reihe { display: flex; gap: 1.75rem; align-items: center; flex-wrap: wrap; justify-content: center; max-width: 1160px; }
    .zaehler { font-size: 0.85rem; font-weight: 500; color: var(--text3); }
    .zaehler span { color: var(--text2); }
    .neu-gemischt { font-size: 0.78rem; color: var(--accent2); font-style: italic; opacity: 0; transition: opacity 0.5s; }
    .neu-gemischt.show { opacity: 1; }

    /* ─── Betonungen (Akzent-Muster) ───────────────────── */
    .betonung-wrap { position: absolute; right: 0; bottom: 0; }
    #betonung-toggle { padding: 7px 14px; font-size: 0.82rem; min-width: 0; }
    .betonung-panel {
      position: absolute; bottom: calc(100% + 8px); right: 0; z-index: 50;
      background: #f0e7d3; border: 1.5px solid var(--border2);
      border-radius: 12px; padding: 0.5rem 0.8rem; min-width: 0;
      box-shadow: var(--shadow);
    }
    .betonung-titel {
      font-size: 0.68rem; font-weight: 700; color: var(--text3);
      text-transform: uppercase; letter-spacing: 0.05em;
      text-align: center; margin-bottom: 4px;
    }
    .betonung-zeile {
      display: flex; justify-content: center; align-items: center; gap: 9px;
      padding: 4px 0; border-bottom: 1px solid var(--border);
    }
    .betonung-zeile:last-child { border-bottom: none; }
    .betonung-zeile span {
      width: 1.5em; height: 1.5em; box-sizing: border-box;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 0.92rem; color: var(--text2);
    }
    .betonung-zeile span.akz {
      color: var(--text); font-weight: 700;
      border: 1px solid var(--text2); border-radius: 50%;
    }

    /* ─── Griffbrett Widget ──────────────────────────────── */
    .griffbrett-widget-wrap {
      border: 1.5px solid var(--border2);
      border-radius: 8px;
      overflow: hidden;
    }
    .griffbrett-widget-wrap iframe {
      display: block;
      width: 100%;
      border: none;
    }

    /* ─── Scrollbar ────────────────────────────────────── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
  </style>
</head>
<body>

<header class="app-header">
  <div class="app-header-inner">
    <a class="back-btn" href="index.html">← Übersicht</a>
    <span class="header-title">Akkord Bandit</span>
    <div style="display:flex;gap:4px;align-items:center">
      <a class="btn btn-ghost btn-sm" style="opacity:0.45;pointer-events:none">🎲 Bandit</a>
      <a class="btn btn-ghost btn-sm" href="fortschritt.html">✅ Fortschritt</a>
    </div>
  </div>
</header>

<div class="page-main">
  <div class="bandit-wrap">

    <!-- Grundton – versteckt, wird vom Griffbrett-Widget gesteuert -->
    <select id="grundton" style="position:absolute;left:-9999px" aria-hidden="true">
      <option>C</option><option>Db</option><option>D</option><option>Eb</option>
      <option>E</option><option>F</option><option>Gb</option><option>G</option>
      <option>Ab</option><option>A</option><option>Bb</option><option>B</option>
    </select>

    <!-- Settings bar: Akkordtyp -->
    <div class="settings-bar">
      <div class="settings-group">
        <span class="section-label">Akkordtyp</span>
        <div class="akkord-buttons">
          <button class="akk-btn aktiv" data-typ="dom7" onclick="waehleAkkord('dom7',this)">dom7</button>
          <button class="akk-btn" data-typ="maj7" onclick="waehleAkkord('maj7',this)">maj7</button>
          <button class="akk-btn" data-typ="moll7" onclick="waehleAkkord('moll7',this)">moll7</button>
          <button class="akk-btn" data-typ="moll7b5" onclick="waehleAkkord('moll7b5',this)">moll7b5</button>
          <button class="akk-btn" data-typ="dim7" onclick="waehleAkkord('dim7',this)">dim7</button>
        </div>
      </div>
    </div>

    <!-- Griffbrett Widget -->
    <div class="griffbrett-widget-wrap">
      <iframe id="griffbrett-iframe" src="akkord_griffbrett.html" height="450"></iframe>
    </div>

    <!-- Akkord name -->
    <div class="akkord-name-display" id="akkord-name">–</div>

    <!-- Practice area: Ziffern | Pfeile -->
    <div class="raeder-wrap">
      <div class="raeder-block">

        <!-- Ziffern -->
        <div class="rad-gruppe">
          <div class="rad-gruppe-titel">Ziffern</div>
          <div class="raeder-reihe" id="raeder-a"></div>
          <div class="ton-pills-reihe" id="ton-pills"></div>
          <div class="start-buttons">
            <button class="start-btn aktiv" data-start="1" onclick="klickeZiffernStart('1')">ab 1</button>
            <button class="start-btn" data-start="3" onclick="klickeZiffernStart('3')">ab 3</button>
            <button class="start-btn" data-start="5" onclick="klickeZiffernStart('5')">ab 5</button>
            <button class="start-btn" data-start="7" onclick="klickeZiffernStart('7')">ab 7</button>
            <button class="reset-btn" id="reset-btn" onclick="resetZiffern()" title="Sequenz von vorne">↺</button>
          </div>
        </div>

        <!-- Pfeile (2er) -->
        <div class="rad-gruppe">
          <div class="rad-gruppe-titel">Pfeile</div>
          <div class="raeder-reihe" id="raeder-b"></div>
          <div style="margin-top:auto;display:flex;gap:8px;flex-wrap:wrap">
            <button class="drehen-btn" id="btn-b" onclick="drehenEinzel('b')">▶ Pfeile</button>
            <button class="drehen-btn beide" id="btn-geuebt" onclick="markiereGeuebt()" disabled>✓ Geübt</button>
          </div>
        </div>

        <!-- Pfeile pro (bis 3er + Notation + Silben) -->
        <div class="rad-gruppe">
          <div class="rad-gruppe-titel">Pfeile <span class="pro-badge">pro</span></div>
          <div class="raeder-reihe" id="raeder-c"></div>
          <div class="notation-reihe" id="notation-c"></div>
          <div class="silben-reihe" id="silben-c"></div>
          <div style="margin-top:auto;display:flex;gap:8px;flex-wrap:wrap">
            <button class="drehen-btn" id="btn-c" onclick="drehenEinzel('c')">▶ Pfeile pro</button>
            <button class="drehen-btn beide" id="btn-geuebt-c" onclick="markiereGeuebtC()" disabled>✓ Geübt</button>
          </div>
        </div>

      </div>

      <!-- Zähler -->
      <div class="zaehler-reihe">
        <div class="zaehler">Ziffern: <span id="zaehler-a">0</span>/24</div>
        <div class="zaehler">Pfeile: <span id="zaehler-b">0</span>/24</div>
        <div class="zaehler">Pfeile pro: <span id="zaehler-c">0</span></div>
        <div class="neu-gemischt" id="neu-gemischt-a"></div>
        <div class="neu-gemischt" id="neu-gemischt-b"></div>
      </div>

      <!-- Betonungen (Akzent-Muster) ein-/ausblendbar -->
      <div class="betonung-wrap">
        <button class="drehen-btn" id="betonung-toggle" onclick="toggleBetonung()">Betonungen ▾</button>
        <div class="betonung-panel" id="betonung-panel" hidden>
          <div class="betonung-titel">Betonung</div>
          <div id="betonung-liste"></div>
        </div>
      </div>
    </div>


  </div>
</div>

<script src="assets/github-api.js"></script>
<script>
const akkordTypen = {
  dom7:    { label:'7',    toene:{'C':'C E G Bb','Db':'Db F Ab Cb','D':'D F# A C','Eb':'Eb G Bb Db','E':'E G# B D','F':'F A C Eb','Gb':'Gb Bb Db Fb','G':'G B D F','Ab':'Ab C Eb Gb','A':'A C# E G','Bb':'Bb D F Ab','B':'B D# F# A'}, funkt:{'1':'Grundton','3':'Terz','5':'Quinte','7':'b7'} },
  maj7:    { label:'maj7', toene:{'C':'C E G B','Db':'Db F Ab C','D':'D F# A C#','Eb':'Eb G Bb D','E':'E G# B D#','F':'F A C E','Gb':'Gb Bb Db F','G':'G B D F#','Ab':'Ab C Eb G','A':'A C# E G#','Bb':'Bb D F A','B':'B D# F# A#'}, funkt:{'1':'Grundton','3':'Terz','5':'Quinte','7':'7'} },
  moll7:   { label:'m7',   toene:{'C':'C Eb G Bb','Db':'Db E Ab Cb','D':'D F A C','Eb':'Eb Gb Bb Db','E':'E G B D','F':'F Ab C Eb','Gb':'Gb A Db Fb','G':'G Bb D F','Ab':'Ab B Eb Gb','A':'A C E G','Bb':'Bb Db F Ab','B':'B D F# A'}, funkt:{'1':'Grundton','3':'b3','5':'Quinte','7':'b7'} },
  moll7b5: { label:'m7b5', toene:{'C':'C Eb Gb Bb','Db':'Db E G Cb','D':'D F Ab C','Eb':'Eb Gb A Db','E':'E G Bb D','F':'F Ab B Eb','Gb':'Gb A C Fb','G':'G Bb Db F','Ab':'Ab B D Gb','A':'A C Eb G','Bb':'Bb Db E Ab','B':'B D F A'}, funkt:{'1':'Grundton','3':'b3','5':'b5','7':'b7'} },
  dim7:    { label:'dim7', toene:{'C':'C Eb Gb A','Db':'Db E G Bb','D':'D F Ab B','Eb':'Eb Gb A C','E':'E G Bb Db','F':'F Ab B D','Gb':'Gb A C Eb','G':'G Bb Db E','Ab':'Ab B D F','A':'A C Eb Gb','Bb':'Bb Db E G','B':'B D F Ab'}, funkt:{'1':'Grundton','3':'b3','5':'b5','7':'bb7'} }
};

const ziffernSymbole = ['1','3','5','7'];
const pfeilSymbole   = ['↑↑','↓↓','↑↓','↓↑'];
// Pfeile pro (Block C): erweiterte Symbole bis 3 Pfeile + Rhythmus-Silben
const pfeilSymboleC  = ['↑','↓','↑↑','↓↓','↑↓','↓↑','↓↓↑','↓↑↑','↓↑↓','↑↓↑','↓↓↓','↑↑↑'];
const SILBEN = [
  { 1: 'Chamä',     2: 'Antilo',           3: 'Es gibt ein'          },
  { 1: 'Rhino',     2: 'Salaman',          3: 'das nennt sich Pferd' },
  { 1: 'die fahrn', 2: 'stehn im Dschung', 3: 'es ist so schön'      },
  { 1: 'nach Hel',  2: 'beieinan',         3: 'ich habs so gern'     },
];

function allePerms(arr) {
  const res = [];
  function p(a, cur) { if(!a.length){res.push([...cur]);return;} a.forEach((v,i)=>{const r=[...a];r.splice(i,1);p(r,[...cur,v]);}); }
  p(arr,[]);
  return res;
}
function mische(arr) {
  const a=[...arr]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a;
}

const ziffernSequenzen = {
  '1': [
    ['1','3','5','7'],['1','3','7','5'],['1','5','3','7'],['1','5','7','3'],['1','7','3','5'],['1','7','5','3'],
    ['3','1','5','7'],['3','1','7','5'],['3','5','1','7'],['3','5','7','1'],['3','7','1','5'],['3','7','5','1'],
    ['5','1','3','7'],['5','1','7','3'],['5','3','1','7'],['5','3','7','1'],['5','7','1','3'],['5','7','3','1'],
    ['7','1','3','5'],['7','1','5','3'],['7','3','1','5'],['7','3','5','1'],['7','5','1','3'],['7','5','3','1'],
  ],
  '3': [
    ['3','1','5','7'],['3','1','7','5'],['3','5','1','7'],['3','5','7','1'],['3','7','1','5'],['3','7','5','1'],
    ['5','1','3','7'],['5','1','7','3'],['5','3','1','7'],['5','3','7','1'],['5','7','1','3'],['5','7','3','1'],
    ['7','1','3','5'],['7','1','5','3'],['7','3','1','5'],['7','3','5','1'],['7','5','1','3'],['7','5','3','1'],
    ['1','3','5','7'],['1','3','7','5'],['1','5','3','7'],['1','5','7','3'],['1','7','3','5'],['1','7','5','3'],
  ],
  '5': [
    ['5','1','3','7'],['5','1','7','3'],['5','3','1','7'],['5','3','7','1'],['5','7','1','3'],['5','7','3','1'],
    ['7','1','3','5'],['7','1','5','3'],['7','3','1','5'],['7','3','5','1'],['7','5','1','3'],['7','5','3','1'],
    ['1','3','5','7'],['1','3','7','5'],['1','5','3','7'],['1','5','7','3'],['1','7','3','5'],['1','7','5','3'],
    ['3','1','5','7'],['3','1','7','5'],['3','5','1','7'],['3','5','7','1'],['3','7','1','5'],['3','7','5','1'],
  ],
  '7': [
    ['7','1','3','5'],['7','1','5','3'],['7','3','1','5'],['7','3','5','1'],['7','5','1','3'],['7','5','3','1'],
    ['1','3','5','7'],['1','3','7','5'],['1','5','3','7'],['1','5','7','3'],['1','7','3','5'],['1','7','5','3'],
    ['3','1','5','7'],['3','1','7','5'],['3','5','1','7'],['3','5','7','1'],['3','7','1','5'],['3','7','5','1'],
    ['5','1','3','7'],['5','1','7','3'],['5','3','1','7'],['5','3','7','1'],['5','7','1','3'],['5','7','3','1'],
  ],
};

let aktiveZiffernSeq = ziffernSequenzen['1'];
let aktiveStart      = '1';
const allePermsB     = allePerms(pfeilSymbole);
let stapelB          = mische(allePermsB);
let gezogenA = 0, gezogenB = 0;
let laeuft = false;
let aktuellerTyp  = 'dom7';
let letzteZiffern = null;
let letztePfeile  = null;
let gezogenC      = 0;
let letztePfeileC = null;

// ── State-Persistenz ─────────────────────────────────────
const BANDIT_STATE_KEY = 'gitueben_bandit_state';

function speichereState() {
  try {
    localStorage.setItem(BANDIT_STATE_KEY, JSON.stringify({
      aktuellerTyp,
      grundton:          document.getElementById('grundton').value,
      aktiveStart,
      gezogenA,
      gezogenB,
      gezogenC,
      stapelB,
      letzteZiffern,
      letztePfeile,
      letztePfeileC,
    }));
  } catch(e) {}
}

function ladeState() {
  try {
    const raw = localStorage.getItem(BANDIT_STATE_KEY);
    if (!raw) return;
    const s = JSON.parse(raw);

    if (s.aktuellerTyp && akkordTypen[s.aktuellerTyp])       aktuellerTyp = s.aktuellerTyp;
    if (s.aktiveStart  && ziffernSequenzen[s.aktiveStart]) {
      aktiveStart      = s.aktiveStart;
      aktiveZiffernSeq = ziffernSequenzen[s.aktiveStart];
    }
    if (typeof s.gezogenA === 'number') gezogenA = s.gezogenA;
    if (typeof s.gezogenB === 'number') gezogenB = s.gezogenB;
    if (Array.isArray(s.stapelB) && s.stapelB.length === allePermsB.length) stapelB = s.stapelB;
    if (Array.isArray(s.letzteZiffern)) letzteZiffern = s.letzteZiffern;
    if (Array.isArray(s.letztePfeile))  letztePfeile  = s.letztePfeile;
    if (typeof s.gezogenC === 'number')  gezogenC = s.gezogenC;
    if (Array.isArray(s.letztePfeileC) && s.letztePfeileC.every(p => pfeilSymboleC.includes(p))) letztePfeileC = s.letztePfeileC;
    // Grundton
    if (s.grundton) document.getElementById('grundton').value = s.grundton;

    // Akkordtyp-Buttons
    document.querySelectorAll('.akk-btn').forEach(b =>
      b.classList.toggle('aktiv', b.dataset.typ === aktuellerTyp)
    );

    // Start-Buttons
    document.querySelectorAll('.start-btn').forEach(b =>
      b.classList.toggle('aktiv', b.dataset.start === aktiveStart)
    );

    // Zähler
    aktualisiereZaehler('a');
    aktualisiereZaehler('b');
    aktualisiereZaehler('c');

    // Räder wiederherstellen
    if (letzteZiffern) animiereStrip('raeder-a', ziffernSymbole, letzteZiffern, () => zeigeAkkord(letzteZiffern));
    if (letztePfeile)  animiereStrip('raeder-b', pfeilSymbole,   letztePfeile,  () => {});
    if (letztePfeileC) {
      animiereStrip('raeder-c', pfeilSymboleC, letztePfeileC, () => {});
      aktualisiereNotationC(letztePfeileC);
      aktualisiereSilbenC(letztePfeileC);
    }

    updateGeuebtBtn();
    updateGeuebtBtnC();
  } catch(e) {}
}

// ── Permutations ─────────────────────────────────────────
function naechsteA() {
  if (gezogenA >= aktiveZiffernSeq.length) { gezogenA = 0; zeigeNeuGemischt('a','↺ von vorne'); }
  return aktiveZiffernSeq[gezogenA++];
}
function naechsteB() {
  if (gezogenB >= stapelB.length) { stapelB = mische(allePermsB); gezogenB = 0; zeigeNeuGemischt('b'); }
  return stapelB[gezogenB++];
}

function klickeZiffernStart(start) {
  if (laeuft) return;
  if (aktiveStart !== start) {
    aktiveStart = start;
    aktiveZiffernSeq = ziffernSequenzen[start];
    gezogenA = 0;
    document.querySelectorAll('.start-btn').forEach(b => b.classList.toggle('aktiv', b.dataset.start === start));
    aktualisiereZaehler('a');
  }
  drehenEinzel('a');
}

function resetZiffern() {
  gezogenA = 0;
  aktualisiereZaehler('a');
  const el = document.getElementById('neu-gemischt-a');
  el.textContent = '↺ zurückgesetzt'; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2000);
  speichereState();
}

function zeigeNeuGemischt(which, msg) {
  const el = document.getElementById('neu-gemischt-' + which);
  el.textContent = msg || '↺ neu gemischt'; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

// ── Akkord ───────────────────────────────────────────────
function waehleAkkord(typ, btn) {
  aktuellerTyp = typ;
  document.querySelectorAll('.akk-btn').forEach(b => b.classList.remove('aktiv'));
  btn.classList.add('aktiv');
  if (letzteZiffern) zeigeAkkord(letzteZiffern);
  speichereState();
  syncGriffbrett();
}

function zeigeAkkord(ziffern) {
  const grundton = document.getElementById('grundton').value;
  const typ = akkordTypen[aktuellerTyp];
  const alle = typ.toene[grundton].split(' ');
  const map = {}; ziffernSymbole.forEach((z,i) => map[z] = alle[i]);
  document.getElementById('akkord-name').textContent = grundton + typ.label + '  ·  ' + ziffern.join(' – ');
  ziffern.forEach((z,i) => {
    const pill = document.getElementById('pill-' + i);
    pill.classList.remove('leer');
    document.getElementById('pill-ton-' + i).textContent  = map[z];
    document.getElementById('pill-funk-' + i).textContent = typ.funkt[z];
  });
}

document.getElementById('grundton').addEventListener('change', () => { if (letzteZiffern) zeigeAkkord(letzteZiffern); speichereState(); syncGriffbrett(); });

// ── Räder ────────────────────────────────────────────────
function erstelleRad(containerId, symbole) {
  const container = document.getElementById(containerId);
  symbole.forEach((_, i) => {
    const wrap = document.createElement('div'); wrap.className = 'rad-wrap';
    const lbl  = document.createElement('div'); lbl.className  = 'rad-lbl'; lbl.textContent = (i+1) + '.';
    const fenster = document.createElement('div'); fenster.className = 'rad-fenster';
    const strip   = document.createElement('div'); strip.className   = 'rad-strip'; strip.id = containerId + '-strip-' + i;
    const hl      = document.createElement('div'); hl.className      = 'highlight';
    symbole.forEach(s => { const div = document.createElement('div'); div.className = 'rad-zelle'; div.textContent = s; strip.appendChild(div); });
    fenster.appendChild(strip); fenster.appendChild(hl);
    wrap.appendChild(lbl); wrap.appendChild(fenster);
    container.appendChild(wrap);
    strip.style.transform = 'translateY(0px)';
  });
}

function erstellePills() {
  const container = document.getElementById('ton-pills');
  for (let i = 0; i < 4; i++) {
    const pill = document.createElement('div'); pill.className = 'ton-pill leer'; pill.id = 'pill-' + i;
    pill.innerHTML = `<span class="ton-name" id="pill-ton-${i}"></span><span class="ton-funktion" id="pill-funk-${i}"></span>`;
    container.appendChild(pill);
  }
}

function animiereStrip(containerId, symbole, ziel, cb) {
  const h = 84;
  for (let i = 0; i < 4; i++) {
    const strip = document.getElementById(containerId + '-strip-' + i);
    strip.style.transition = 'none';
    strip.style.transform  = `translateY(${-symbole.indexOf(ziel[i]) * h}px)`;
  }
  cb();
}

function aktualisiereZaehler(which) {
  document.getElementById('zaehler-' + which).textContent = which === 'a' ? gezogenA : which === 'b' ? gezogenB : gezogenC;
}

function sperreButtons(an) {
  document.querySelectorAll('.start-btn, .reset-btn, #btn-b, #btn-c').forEach(el => el.disabled = an);
}

function drehenEinzel(which) {
  if (laeuft) return;
  laeuft = true; sperreButtons(true);
  if (which === 'a') {
    const ziel = naechsteA(); aktualisiereZaehler('a');
    animiereStrip('raeder-a', ziffernSymbole, ziel, () => { letzteZiffern = ziel; zeigeAkkord(ziel); laeuft = false; sperreButtons(false); updateGeuebtBtn(); updateGeuebtBtnC(); speichereState(); });
  } else if (which === 'b') {
    const ziel = naechsteB(); aktualisiereZaehler('b');
    animiereStrip('raeder-b', pfeilSymbole, ziel, () => { letztePfeile = ziel; laeuft = false; sperreButtons(false); updateGeuebtBtn(); speichereState(); });
  } else {
    const ziel = zieheZufaelligePfeileC(); gezogenC++; aktualisiereZaehler('c');
    animiereStrip('raeder-c', pfeilSymboleC, ziel, () => { letztePfeileC = ziel; aktualisiereNotationC(ziel); aktualisiereSilbenC(ziel); laeuft = false; sperreButtons(false); updateGeuebtBtnC(); speichereState(); });
  }
}

// ── Geübt ────────────────────────────────────────────────
function updateGeuebtBtn() {
  document.getElementById('btn-geuebt').disabled = !(letzteZiffern && letztePfeile);
}

function zeitstempel() {
  const d = new Date();
  return `${String(d.getDate()).padStart(2,'0')}.${String(d.getMonth()+1).padStart(2,'0')}. ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

function markiereGeuebt() {
  if (!letzteZiffern || !letztePfeile) return;
  const KEY = 'gitueben_geuebt';
  const typ = aktuellerTyp;
  const zeit = zeitstempel();

  // Auf dem GitHub-Stand aufbauen statt auf dem lokalen Cache: der Cache wird
  // sonst nie mit GitHub abgeglichen und ein veralteter lokaler Wert würde den
  // echten (höheren) Online-Stand beim Speichern überschreiben.
  GitHubAPI.load().then(data => {
    const zaehler = data.geuebt || {};
    const prev = zaehler[typ] || { count: 0 };
    zaehler[typ] = { count: prev.count + 1, zeit };
    data.geuebt = zaehler;
    localStorage.setItem(KEY, JSON.stringify(zaehler));
    GitHubAPI.save(data);
  });

  const btn = document.getElementById('btn-geuebt');
  btn.textContent = '✓ Gespeichert';
  btn.style.cssText = 'background:var(--accent2);color:#fff;border-color:var(--accent2)';
  setTimeout(() => { btn.textContent = '✓ Geübt'; btn.style.cssText = ''; }, 1800);
}

// ── Griffbrett Sync ──────────────────────────────────────
function syncGriffbrett() {
  const iframe = document.getElementById('griffbrett-iframe');
  if (!iframe || !iframe.contentWindow) return;
  iframe.contentWindow.postMessage({
    chord:    aktuellerTyp,
    grundton: document.getElementById('grundton').value,
  }, '*');
}

// ── Pfeile pro (Block C): Zufallsziehung, Räder, Notation, Silben, Geübt ──
function zieheZufaelligePfeileC() {
  const pool = [...pfeilSymboleC];
  const result = [];
  for (let i = 0; i < 4; i++) {
    const idx = Math.floor(Math.random() * pool.length);
    result.push(pool.splice(idx, 1)[0]);
  }
  return result;
}

// Räder mit fester Stellenzahl (jede Stelle zeigt alle Symbole)
function erstelleRadN(containerId, positionen, symbole) {
  const container = document.getElementById(containerId);
  for (let i = 0; i < positionen; i++) {
    const wrap = document.createElement('div'); wrap.className = 'rad-wrap';
    const lbl  = document.createElement('div'); lbl.className  = 'rad-lbl'; lbl.textContent = (i + 1) + '.';
    const fenster = document.createElement('div'); fenster.className = 'rad-fenster';
    const strip   = document.createElement('div'); strip.className   = 'rad-strip'; strip.id = containerId + '-strip-' + i;
    const hl      = document.createElement('div'); hl.className      = 'highlight';
    symbole.forEach(s => { const div = document.createElement('div'); div.className = 'rad-zelle'; div.textContent = s; strip.appendChild(div); });
    fenster.appendChild(strip); fenster.appendChild(hl);
    wrap.appendChild(lbl); wrap.appendChild(fenster);
    container.appendChild(wrap);
    strip.style.transform = 'translateY(0px)';
  }
}

// Rhythmische Notation: 1 Kästchen = 1 Viertel; len 1/2/3 = Pause(n) + 1/2/3 Sechzehntel
function notationSVG(symbol) {
  const ink = 'currentColor';
  const nh = (cx) => `<ellipse cx="${cx}" cy="36" rx="5" ry="3.5" transform="rotate(-15 ${cx} 36)" fill="${ink}"/>`;
  const st = (cx) => `<line x1="${cx+4.5}" y1="36" x2="${cx+4.5}" y2="14" stroke="${ink}" stroke-width="1.5"/>`;
  const fl = (cx) => {
    const x = cx + 4.5;
    return `<path d="M ${x},14 C ${x+11},17 ${x+11},26 ${x+1},29" stroke="${ink}" stroke-width="1.5" fill="none" stroke-linecap="round"/>` +
           `<path d="M ${x},20 C ${x+11},23 ${x+11},32 ${x+1},35" stroke="${ink}" stroke-width="1.5" fill="none" stroke-linecap="round"/>`;
  };
  const bm = (cx1, cx2) =>
    `<rect x="${cx1+4.5}" y="14"  width="${cx2-cx1}" height="3.5" fill="${ink}"/>` +
    `<rect x="${cx1+4.5}" y="20"  width="${cx2-cx1}" height="3.5" fill="${ink}"/>`;
  const er = (x, sz=26) => `<text x="${x}" y="32" font-size="${sz}" class="nrest" fill="${ink}">\u{1D13E}</text>`;
  const sr = (x, sz=26) => `<text x="${x}" y="32" font-size="${sz}" class="nrest" fill="${ink}">\u{1D13F}</text>`;
  let inner = '';
  const len = symbol.length;
  if (len === 1) {
    inner = er(2, 22) + sr(22, 22) + nh(52) + st(52) + fl(52);
  } else if (len === 2) {
    inner = er(4) + nh(32) + st(32) + nh(56) + st(56) + bm(32, 56);
  } else {
    inner = sr(4) + nh(25) + st(25) + nh(45) + st(45) + nh(64) + st(64) + bm(25, 64);
  }
  return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 88 54" style="display:block;width:100%;height:100%">${inner}</svg>`;
}

function erstelleNotationsBoxenC() {
  const container = document.getElementById('notation-c');
  container.innerHTML = '';
  for (let i = 0; i < 4; i++) {
    const box = document.createElement('div'); box.className = 'notation-box leer'; box.id = 'notation-box-' + i;
    container.appendChild(box);
  }
}
function aktualisiereNotationC(pfeile) {
  pfeile.forEach((symbol, i) => {
    const box = document.getElementById('notation-box-' + i);
    if (!box) return;
    box.className = 'notation-box';
    box.innerHTML = notationSVG(symbol);
  });
}

function erstelleSilbenBoxenC() {
  const container = document.getElementById('silben-c');
  container.innerHTML = '';
  for (let i = 0; i < 4; i++) {
    const box = document.createElement('div'); box.className = 'silben-box leer'; box.id = 'silben-box-' + i;
    container.appendChild(box);
  }
}
function aktualisiereSilbenC(pfeile) {
  pfeile.forEach((symbol, i) => {
    const box = document.getElementById('silben-box-' + i);
    if (!box) return;
    box.className = 'silben-box';
    box.textContent = SILBEN[i][symbol.length];
  });
}

function updateGeuebtBtnC() {
  document.getElementById('btn-geuebt-c').disabled = !(letzteZiffern && letztePfeileC);
}
function markiereGeuebtC() {
  if (!letzteZiffern || !letztePfeileC) return;
  const PRO_KEY = 'gitueben_pro_geuebt';
  const typ = aktuellerTyp;
  const zeit = zeitstempel();

  GitHubAPI.load().then(data => {
    const zaehler = data.proGeuebt || {};
    const prev = zaehler[typ];
    const prevCount = typeof prev === 'number' ? prev : (prev?.count || 0);
    zaehler[typ] = { count: prevCount + 1, zeit };
    data.proGeuebt = zaehler;
    localStorage.setItem(PRO_KEY, JSON.stringify(zaehler));
    GitHubAPI.save(data);
  });

  const btn = document.getElementById('btn-geuebt-c');
  btn.textContent = '✓ Gespeichert';
  btn.style.cssText = 'background:var(--accent2);color:#fff;border-color:var(--accent2)';
  setTimeout(() => { btn.textContent = '✓ Geübt'; btn.style.cssText = ''; }, 1800);
}

// ── Betonungen (alle 16 Akzent-Muster über 4 Positionen) ──
function betonungsMuster() {
  const res = [];
  for (let k = 0; k <= 4; k++) {
    (function pick(start, cur) {
      if (cur.length === k) { res.push([...cur]); return; }
      for (let i = start; i < 4; i++) { cur.push(i); pick(i + 1, cur); cur.pop(); }
    })(0, []);
  }
  return res; // 16 Muster, je ein Array betonter Positionen (0–3)
}
function buildBetonung() {
  const liste = document.getElementById('betonung-liste');
  liste.innerHTML = '';
  betonungsMuster().forEach(set => {
    const z = document.createElement('div');
    z.className = 'betonung-zeile';
    z.innerHTML = [1, 2, 3, 4].map((n, i) => '<span class="' + (set.includes(i) ? 'akz' : '') + '">' + n + '</span>').join('');
    liste.appendChild(z);
  });
}
function toggleBetonung() {
  const panel = document.getElementById('betonung-panel');
  const show  = panel.hidden;
  panel.hidden = !show;
  document.getElementById('betonung-toggle').textContent = show ? 'Betonungen ▴' : 'Betonungen ▾';
}

// ── Init ─────────────────────────────────────────────────
erstelleRad('raeder-a', ziffernSymbole);
erstelleRad('raeder-b', pfeilSymbole);
erstelleRadN('raeder-c', 4, pfeilSymboleC);
erstelleNotationsBoxenC();
erstelleSilbenBoxenC();
erstellePills();
buildBetonung();

// Griffbrett-iframe: beim Laden initialen Zustand schicken
document.getElementById('griffbrett-iframe').addEventListener('load', syncGriffbrett);

window.addEventListener('message', (e) => {
  if (e.data && e.data.grundtonUpdate) {
    document.getElementById('grundton').value = e.data.grundtonUpdate;
    if (typeof letzteZiffern !== 'undefined' && letzteZiffern) zeigeAkkord(letzteZiffern);
    speichereState();
  }
  if (e.data && typeof e.data.griffbrettHeight === 'number') {
    document.getElementById('griffbrett-iframe').style.height = e.data.griffbrettHeight + 'px';
  }
});

window.addEventListener('pageshow', (e) => {
  if (!e.persisted) ladeState();
  syncGriffbrett();
});
</script>
