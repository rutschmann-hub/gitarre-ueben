<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Akkord Bandit Pro – Gitarrenübungen</title>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <link rel="stylesheet" href="assets/style.css">
  <style>
    body { display: flex; flex-direction: column; min-height: 100vh; }

    .page-main {
      flex: 1;
      overflow-x: auto;
      display: flex;
      justify-content: center;
      padding: 2rem 1.5rem 3rem;
    }

    .bandit-wrap {
      width: 100%;
      max-width: 1080px;
      display: flex;
      flex-direction: column;
      gap: 1.75rem;
    }

    /* ─── Settings bar ─────────────────────────────────── */
    .settings-bar {
      display: flex;
      align-items: center;
      gap: 1.25rem;
      flex-wrap: wrap;
      padding: 0.9rem 1.25rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }

    .settings-sep {
      width: 1px;
      height: 1.8rem;
      background: var(--border2);
      flex-shrink: 0;
    }

    .settings-group {
      display: flex;
      align-items: center;
      gap: 0.7rem;
    }

    .section-label {
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      white-space: nowrap;
    }

    select {
      font-family: 'DM Mono', monospace;
      font-size: 0.9rem;
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border2);
      border-radius: 6px;
      padding: 5px 10px;
      cursor: pointer;
      outline: none;
    }
    select:focus { border-color: var(--accent); }

    .akkord-buttons { display: flex; gap: 6px; flex-wrap: wrap; }

    .akk-btn {
      padding: 5px 16px;
      font-family: 'DM Mono', monospace;
      font-size: 0.88rem;
      font-weight: 500;
      cursor: pointer;
      border-radius: 4px;
      background: transparent;
      color: var(--text2);
      border: 1px solid var(--border2);
      transition: all 0.15s;
    }
    .akk-btn:hover { border-color: var(--accent); color: var(--accent); }
    .akk-btn.aktiv { background: var(--accent); color: #fff; border-color: var(--accent); }

    /* ─── Akkord name ──────────────────────────────────── */
    .akkord-name-display {
      font-family: 'Fraunces', serif;
      font-size: 2.1rem;
      font-weight: 600;
      color: var(--accent);
      min-height: 2.6rem;
      letter-spacing: -0.01em;
    }

    .raeder-wrap {
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    /* ─── Räder ────────────────────────────────────────── */
    .raeder-block { display: flex; gap: 0; align-items: stretch; }
    .rad-gruppe { display: flex; flex-direction: column; gap: 10px; }
    .rad-gruppe-titel {
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .raeder-reihe { display: flex; gap: 10px; }
    .rad-wrap { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .rad-lbl { font-size: 0.65rem; color: var(--text3); }

    .rad-fenster {
      width: 88px;
      height: 108px;
      border: 1.5px solid var(--border2);
      border-radius: 8px;
      overflow: hidden;
      position: relative;
      background: #fff;
    }
    .rad-strip {
      position: absolute;
      width: 100%;
      display: flex;
      flex-direction: column;
    }
    .rad-zelle {
      height: 108px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;        /* kleiner als Original wegen längerer Symbole */
      color: var(--text);
      letter-spacing: -0.05em;
    }
    .highlight {
      position: absolute;
      inset: 0;
      border: 2.5px solid var(--accent);
      border-radius: 8px;
      pointer-events: none;
      z-index: 10;
      box-shadow: inset 0 0 14px rgba(139,94,60,0.08);
    }

    /* ─── Ton-Pills ────────────────────────────────────── */
    .ton-pills-reihe { display: flex; gap: 10px; }
    .ton-pill {
      width: 88px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 6px;
      transition: all 0.2s;
    }
    .ton-pill.leer { background: transparent; border-color: transparent; }
    .ton-name { font-size: 20px; font-weight: 500; color: var(--accent); }
    .ton-funktion { font-size: 11px; color: var(--text3); }

    .trennlinie {
      width: 1px;
      background: var(--border);
      align-self: stretch;
      margin: 0 1.5rem;
    }

    /* ─── Buttons ──────────────────────────────────────── */
    .drehen-btn {
      padding: 10px 26px;
      font-family: 'DM Mono', monospace;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      border-radius: 6px;
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border2);
      transition: all 0.15s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }
    .drehen-btn:hover  { border-color: var(--accent); color: var(--accent); background: var(--surface); }
    .drehen-btn:active { transform: scale(0.97); }
    .drehen-btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }
    .drehen-btn.beide  { border-color: var(--accent); color: var(--accent); }
    .drehen-btn.beide:hover { background: var(--accent); color: #fff; }

    .start-buttons { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }
    .start-btn {
      padding: 6px 14px;
      font-family: 'DM Mono', monospace;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      border-radius: 4px;
      background: transparent;
      color: var(--text2);
      border: 1px solid var(--border2);
      transition: all 0.15s;
    }
    .start-btn:hover { border-color: var(--accent); color: var(--accent); }
    .start-btn.aktiv { background: var(--accent); color: #fff; border-color: var(--accent); }
    .start-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    .reset-btn {
      padding: 6px 10px;
      font-family: 'DM Mono', monospace;
      font-size: 0.88rem;
      cursor: pointer;
      border-radius: 4px;
      background: transparent;
      color: var(--text3);
      border: 1px solid var(--border);
      transition: all 0.15s;
      margin-left: 2px;
    }
    .reset-btn:hover { border-color: var(--accent2); color: var(--accent2); }
    .reset-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    /* ─── Zähler ───────────────────────────────────────── */
    .zaehler-reihe { display: flex; gap: 1.75rem; align-items: center; flex-wrap: wrap; }
    .zaehler { font-size: 0.85rem; font-weight: 500; color: var(--text3); }
    .zaehler span { color: var(--text2); }
    .neu-gemischt { font-size: 0.78rem; color: var(--accent2); font-style: italic; opacity: 0; transition: opacity 0.5s; }
    .neu-gemischt.show { opacity: 1; }

    /* ─── Pro-Badge ────────────────────────────────────── */
    .pro-info {
      font-size: 0.75rem;
      color: var(--text3);
      font-family: 'DM Mono', monospace;
      padding: 0.4rem 0.8rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }

    /* ─── Griffbrett ───────────────────────────────────── */
    .griffbrett-gruppe {
      width: 250px;
      flex-shrink: 0;
    }

    .griffbild-frame {
      width: 100%;
      height: 162px;
      border: 1.5px solid var(--border2);
      border-radius: 8px;
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    .griffbild-leer {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      color: var(--text3);
      font-size: 0.78rem;
      pointer-events: none;
    }
    .griffbild-leer-icon { font-size: 2.8rem; opacity: 0.35; }

    #griffbild-img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: none;
      opacity: 0;
      transition: opacity 0.22s ease;
    }

    /* ─── Notations-Kästchen ──────────────────────────── */
    .notation-reihe {
      display: flex;
      gap: 10px;
      margin-top: 6px;
    }
    .notation-box {
      width: 88px;
      height: 54px;
      border: 1.5px solid var(--border2);
      border-radius: 8px;
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text);
      overflow: hidden;
      flex-shrink: 0;
    }
    .notation-box.leer {
      border-style: dashed;
      opacity: 0.3;
    }
    /* Musikpausen: lokale Teilmenge (nur 𝄾 𝄿) – kein Netz nötig */
    @font-face {
      font-family: 'Noto Sans Symbols 2';
      src: url('assets/fonts/noto-music-subset.ttf') format('truetype');
      font-display: swap;
    }
    .nrest {
      font-family: 'Noto Sans Symbols 2', 'Apple Symbols', 'Segoe UI Symbol', serif;
    }

    /* ─── Scrollbar ────────────────────────────────────── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
  </style>
</head>
<body>

<header class="app-header">
  <div class="app-header-inner">
    <a class="back-btn" href="index.html">← Übersicht</a>
    <span class="header-title">Akkord Bandit <em style="font-style:normal;font-size:0.7em;opacity:0.7">PRO</em></span>
    <a class="btn btn-ghost btn-sm" href="akkord-bandit.html">🎲 Standard</a>
  </div>
</header>

<div class="page-main">
  <div class="bandit-wrap">

    <!-- Settings bar: Grundton + Akkordtyp -->
    <div class="settings-bar">
      <div class="settings-group">
        <span class="section-label">Grundton</span>
        <select id="grundton">
          <option>C</option><option>Db</option><option>D</option><option>Eb</option>
          <option>E</option><option>F</option><option>Gb</option><option>G</option>
          <option>Ab</option><option>A</option><option>Bb</option><option>B</option>
        </select>
      </div>
      <div class="settings-sep"></div>
      <div class="settings-group">
        <span class="section-label">Akkordtyp</span>
        <div class="akkord-buttons">
          <button class="akk-btn aktiv" data-typ="dom7" onclick="waehleAkkord('dom7',this)">dom7</button>
          <button class="akk-btn" data-typ="maj7" onclick="waehleAkkord('maj7',this)">maj7</button>
          <button class="akk-btn" data-typ="moll7" onclick="waehleAkkord('moll7',this)">moll7</button>
          <button class="akk-btn" data-typ="moll7b5" onclick="waehleAkkord('moll7b5',this)">moll7b5</button>
        </div>
      </div>
      <div class="settings-sep"></div>
      <span class="pro-info">🎯 10 Pfeil-Symbole · P(10,4) = 5040 Kombinationen</span>
    </div>

    <!-- Akkord name -->
    <div class="akkord-name-display" id="akkord-name">–</div>

    <!-- Practice area: Ziffern | Pfeile | Griffbrett -->
    <div class="raeder-wrap">
      <div class="raeder-block">

        <!-- Ziffern -->
        <div class="rad-gruppe">
          <div class="rad-gruppe-titel">Ziffern</div>
          <div class="raeder-reihe" id="raeder-a"></div>
          <div class="ton-pills-reihe" id="ton-pills"></div>
          <div class="start-buttons">
            <button class="start-btn aktiv" data-start="1" onclick="klickeZiffernStart('1')">ab 1</button>
            <button class="start-btn" data-start="3" onclick="klickeZiffernStart('3')">ab 3</button>
            <button class="start-btn" data-start="5" onclick="klickeZiffernStart('5')">ab 5</button>
            <button class="start-btn" data-start="7" onclick="klickeZiffernStart('7')">ab 7</button>
            <button class="reset-btn" id="reset-btn" onclick="resetZiffern()" title="Sequenz von vorne">↺</button>
          </div>
        </div>

        <div class="trennlinie"></div>

        <!-- Pfeile (Pro: 10 Symbole) -->
        <div class="rad-gruppe">
          <div class="rad-gruppe-titel">Pfeile <span style="font-size:0.65rem;color:var(--accent);letter-spacing:0">pro</span></div>
          <div class="raeder-reihe" id="raeder-b"></div>
          <div class="notation-reihe" id="notation-b"></div>
          <div style="margin-top:auto">
            <button class="drehen-btn" id="btn-b" onclick="drehenEinzel('b')">▶ Pfeile</button>
          </div>
        </div>

        <div class="trennlinie"></div>

        <!-- Griffbrett -->
        <div class="rad-gruppe griffbrett-gruppe">
          <div class="rad-gruppe-titel">Griffbrett</div>
          <div class="griffbild-frame">
            <div class="griffbild-leer" id="griffbild-leer">
              <div class="griffbild-leer-icon">🎸</div>
              <span>Griffbild</span>
            </div>
            <img id="griffbild-img" alt="Griffbild">
          </div>
          <div style="margin-top:auto">
            <button class="drehen-btn" id="btn-griffbrett" onclick="zeigeGriffbild()">▶ Griffbrett</button>
          </div>
        </div>

      </div>

      <!-- Zähler -->
      <div class="zaehler-reihe">
        <div class="zaehler">Ziffern: <span id="zaehler-a">0</span>/24</div>
        <div class="zaehler">Pfeile: <span id="zaehler-b">0</span> gezogen</div>
        <div class="neu-gemischt" id="neu-gemischt-a"></div>
      </div>
    </div>

    <!-- Geübt -->
    <div>
      <button class="drehen-btn beide" id="btn-geuebt" onclick="markiereGeuebt()" disabled>✓ Geübt</button>
    </div>

  </div>
</div>

<script>
const akkordTypen = {
  dom7:    { label:'7',    toene:{'C':'C E G Bb','Db':'Db F Ab Cb','D':'D F# A C','Eb':'Eb G Bb Db','E':'E G# B D','F':'F A C Eb','Gb':'Gb Bb Db Fb','G':'G B D F','Ab':'Ab C Eb Gb','A':'A C# E G','Bb':'Bb D F Ab','B':'B D# F# A'}, funkt:{'1':'Grundton','3':'Terz','5':'Quinte','7':'b7'} },
  maj7:    { label:'maj7', toene:{'C':'C E G B','Db':'Db F Ab C','D':'D F# A C#','Eb':'Eb G Bb D','E':'E G# B D#','F':'F A C E','Gb':'Gb Bb Db F','G':'G B D F#','Ab':'Ab C Eb G','A':'A C# E G#','Bb':'Bb D F A','B':'B D# F# A#'}, funkt:{'1':'Grundton','3':'Terz','5':'Quinte','7':'7'} },
  moll7:   { label:'m7',   toene:{'C':'C Eb G Bb','Db':'Db E Ab Cb','D':'D F A C','Eb':'Eb Gb Bb Db','E':'E G B D','F':'F Ab C Eb','Gb':'Gb A Db Fb','G':'G Bb D F','Ab':'Ab B Eb Gb','A':'A C E G','Bb':'Bb Db F Ab','B':'B D F# A'}, funkt:{'1':'Grundton','3':'b3','5':'Quinte','7':'b7'} },
  moll7b5: { label:'m7b5', toene:{'C':'C Eb Gb Bb','Db':'Db E G Cb','D':'D F Ab C','Eb':'Eb Gb A Db','E':'E G Bb D','F':'F Ab B Eb','Gb':'Gb A C Fb','G':'G Bb Db F','Ab':'Ab B D Gb','A':'A C Eb G','Bb':'Bb Db E Ab','B':'B D F A'}, funkt:{'1':'Grundton','3':'b3','5':'b5','7':'b7'} }
};

const ziffernSymbole = ['1','3','5','7'];

// ── Erweiterte Pfeil-Symbole (10 Stück, keine Wiederholung in einer Kombo) ──
const pfeilSymbole = ['↑','↓','↑↑','↓↓','↑↓','↓↑','↓↓↑','↓↑↑','↓↑↓','↑↓↑'];

function allePerms(arr) {
  const res = [];
  (function p(a, cur) {
    if (!a.length) { res.push([...cur]); return; }
    a.forEach((v, i) => { const r = [...a]; r.splice(i, 1); p(r, [...cur, v]); });
  })(arr, []);
  return res;
}

function mische(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

const ziffernSequenzen = {
  '1': [
    ['1','3','5','7'],['1','3','7','5'],['1','5','3','7'],['1','5','7','3'],['1','7','3','5'],['1','7','5','3'],
    ['3','1','5','7'],['3','1','7','5'],['3','5','1','7'],['3','5','7','1'],['3','7','1','5'],['3','7','5','1'],
    ['5','1','3','7'],['5','1','7','3'],['5','3','1','7'],['5','3','7','1'],['5','7','1','3'],['5','7','3','1'],
    ['7','1','3','5'],['7','1','5','3'],['7','3','1','5'],['7','3','5','1'],['7','5','1','3'],['7','5','3','1'],
  ],
  '3': [
    ['3','1','5','7'],['3','1','7','5'],['3','5','1','7'],['3','5','7','1'],['3','7','1','5'],['3','7','5','1'],
    ['5','1','3','7'],['5','1','7','3'],['5','3','1','7'],['5','3','7','1'],['5','7','1','3'],['5','7','3','1'],
    ['7','1','3','5'],['7','1','5','3'],['7','3','1','5'],['7','3','5','1'],['7','5','1','3'],['7','5','3','1'],
    ['1','3','5','7'],['1','3','7','5'],['1','5','3','7'],['1','5','7','3'],['1','7','3','5'],['1','7','5','3'],
  ],
  '5': [
    ['5','1','3','7'],['5','1','7','3'],['5','3','1','7'],['5','3','7','1'],['5','7','1','3'],['5','7','3','1'],
    ['7','1','3','5'],['7','1','5','3'],['7','3','1','5'],['7','3','5','1'],['7','5','1','3'],['7','5','3','1'],
    ['1','3','5','7'],['1','3','7','5'],['1','5','3','7'],['1','5','7','3'],['1','7','3','5'],['1','7','5','3'],
    ['3','1','5','7'],['3','1','7','5'],['3','5','1','7'],['3','5','7','1'],['3','7','1','5'],['3','7','5','1'],
  ],
  '7': [
    ['7','1','3','5'],['7','1','5','3'],['7','3','1','5'],['7','3','5','1'],['7','5','1','3'],['7','5','3','1'],
    ['1','3','5','7'],['1','3','7','5'],['1','5','3','7'],['1','5','7','3'],['1','7','3','5'],['1','7','5','3'],
    ['3','1','5','7'],['3','1','7','5'],['3','5','1','7'],['3','5','7','1'],['3','7','1','5'],['3','7','5','1'],
    ['5','1','3','7'],['5','1','7','3'],['5','3','1','7'],['5','3','7','1'],['5','7','1','3'],['5','7','3','1'],
  ],
};

let aktiveZiffernSeq = ziffernSequenzen['1'];
let aktiveStart      = '1';
let gezogenA = 0, gezogenB = 0;
let laeuft = false;
let aktuellerTyp  = 'dom7';
let letzteZiffern = null;
let letztePfeile  = null;

// ── State-Persistenz ─────────────────────────────────────
const BANDIT_STATE_KEY = 'gitueben_bandit_pro_state';

function speichereState() {
  try {
    localStorage.setItem(BANDIT_STATE_KEY, JSON.stringify({
      aktuellerTyp,
      grundton:          document.getElementById('grundton').value,
      aktiveStart,
      gezogenA,
      gezogenB,
      letzteZiffern,
      letztePfeile,
      letzterGriffbildIdx,
      griffbildSichtbar: document.getElementById('griffbild-img').style.display === 'block',
    }));
  } catch(e) {}
}

function ladeState() {
  try {
    const raw = localStorage.getItem(BANDIT_STATE_KEY);
    if (!raw) return;
    const s = JSON.parse(raw);

    if (s.aktuellerTyp && akkordTypen[s.aktuellerTyp])       aktuellerTyp = s.aktuellerTyp;
    if (s.aktiveStart  && ziffernSequenzen[s.aktiveStart]) {
      aktiveStart      = s.aktiveStart;
      aktiveZiffernSeq = ziffernSequenzen[s.aktiveStart];
    }
    if (typeof s.gezogenA === 'number') gezogenA = s.gezogenA;
    if (typeof s.gezogenB === 'number') gezogenB = s.gezogenB;
    if (Array.isArray(s.letzteZiffern)) letzteZiffern = s.letzteZiffern;
    if (Array.isArray(s.letztePfeile) && s.letztePfeile.every(p => pfeilSymbole.includes(p))) letztePfeile = s.letztePfeile;
    if (typeof s.letzterGriffbildIdx === 'number') letzterGriffbildIdx = s.letzterGriffbildIdx;

    // Grundton
    if (s.grundton) document.getElementById('grundton').value = s.grundton;

    // Akkordtyp-Buttons
    document.querySelectorAll('.akk-btn').forEach(b =>
      b.classList.toggle('aktiv', b.dataset.typ === aktuellerTyp)
    );

    // Start-Buttons
    document.querySelectorAll('.start-btn').forEach(b =>
      b.classList.toggle('aktiv', b.dataset.start === aktiveStart)
    );

    // Zähler
    aktualisiereZaehler('a');
    aktualisiereZaehler('b');

    // Räder wiederherstellen
    if (letzteZiffern) animiereStrip('raeder-a', ziffernSymbole, letzteZiffern, () => zeigeAkkord(letzteZiffern));
    if (letztePfeile) {
      animiereStrip('raeder-b', pfeilSymbole, letztePfeile, () => {});
      aktualisiereNotation(letztePfeile);
    }

    // Griffbild wiederherstellen
    if (s.griffbildSichtbar && letzterGriffbildIdx >= 0) {
      const img  = document.getElementById('griffbild-img');
      const leer = document.getElementById('griffbild-leer');
      img.src            = GRIFFBILDER[aktuellerTyp][letzterGriffbildIdx];
      img.style.display  = 'block';
      img.style.opacity  = '1';
      leer.style.display = 'none';
    }

    updateGeuebtBtn();
  } catch(e) {}
}

// ── Ziffern-Permutationen (wie Original) ─────────────────
function naechsteA() {
  if (gezogenA >= aktiveZiffernSeq.length) {
    gezogenA = 0;
    zeigeNeuGemischt('a', '↺ von vorne');
  }
  return aktiveZiffernSeq[gezogenA++];
}

function klickeZiffernStart(start) {
  if (laeuft) return;
  if (aktiveStart !== start) {
    aktiveStart = start;
    aktiveZiffernSeq = ziffernSequenzen[start];
    gezogenA = 0;
    document.querySelectorAll('.start-btn').forEach(b => b.classList.toggle('aktiv', b.dataset.start === start));
    aktualisiereZaehler('a');
  }
  drehenEinzel('a');
}

function resetZiffern() {
  gezogenA = 0;
  aktualisiereZaehler('a');
  const el = document.getElementById('neu-gemischt-a');
  el.textContent = '↺ zurückgesetzt'; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2000);
  speichereState();
}

function zeigeNeuGemischt(which, msg) {
  const el = document.getElementById('neu-gemischt-' + which);
  if (!el) return;
  el.textContent = msg || '↺ neu gemischt'; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

// ── Pro: Zufällige Pfeil-Auswahl (4 verschiedene aus 10) ──
function zieheZufaelligePfeile() {
  const pool = [...pfeilSymbole];
  const result = [];
  for (let i = 0; i < 4; i++) {
    const idx = Math.floor(Math.random() * pool.length);
    result.push(pool.splice(idx, 1)[0]);
  }
  return result;
}

// ── Akkord ───────────────────────────────────────────────
function waehleAkkord(typ, btn) {
  aktuellerTyp = typ;
  document.querySelectorAll('.akk-btn').forEach(b => b.classList.remove('aktiv'));
  btn.classList.add('aktiv');
  if (letzteZiffern) zeigeAkkord(letzteZiffern);
  speichereState();
}

function zeigeAkkord(ziffern) {
  const grundton = document.getElementById('grundton').value;
  const typ = akkordTypen[aktuellerTyp];
  const alle = typ.toene[grundton].split(' ');
  const map = {}; ziffernSymbole.forEach((z, i) => map[z] = alle[i]);
  document.getElementById('akkord-name').textContent = grundton + typ.label + '  ·  ' + ziffern.join(' – ');
  ziffern.forEach((z, i) => {
    const pill = document.getElementById('pill-' + i);
    pill.classList.remove('leer');
    document.getElementById('pill-ton-' + i).textContent  = map[z];
    document.getElementById('pill-funk-' + i).textContent = typ.funkt[z];
  });
}

document.getElementById('grundton').addEventListener('change', () => {
  if (letzteZiffern) zeigeAkkord(letzteZiffern);
  speichereState();
});

// ── Räder ────────────────────────────────────────────────
// positionen = Anzahl der Räder (Stellen); symbole = alle wählbaren Werte je Rad
function erstelleRad(containerId, positionen, symbole) {
  const container = document.getElementById(containerId);
  for (let i = 0; i < positionen; i++) {
    const wrap    = document.createElement('div'); wrap.className = 'rad-wrap';
    const lbl     = document.createElement('div'); lbl.className  = 'rad-lbl'; lbl.textContent = (i + 1) + '.';
    const fenster = document.createElement('div'); fenster.className = 'rad-fenster';
    const strip   = document.createElement('div'); strip.className   = 'rad-strip'; strip.id = containerId + '-strip-' + i;
    const hl      = document.createElement('div'); hl.className      = 'highlight';
    symbole.forEach(s => {
      const div = document.createElement('div'); div.className = 'rad-zelle'; div.textContent = s;
      strip.appendChild(div);
    });
    fenster.appendChild(strip); fenster.appendChild(hl);
    wrap.appendChild(lbl); wrap.appendChild(fenster);
    container.appendChild(wrap);
    strip.style.transform = 'translateY(0px)';
  }
}

function erstellePills() {
  const container = document.getElementById('ton-pills');
  for (let i = 0; i < 4; i++) {
    const pill = document.createElement('div'); pill.className = 'ton-pill leer'; pill.id = 'pill-' + i;
    pill.innerHTML = `<span class="ton-name" id="pill-ton-${i}"></span><span class="ton-funktion" id="pill-funk-${i}"></span>`;
    container.appendChild(pill);
  }
}

function animiereStrip(containerId, symbole, ziel, cb) {
  const h = 108;
  for (let i = 0; i < 4; i++) {
    const strip = document.getElementById(containerId + '-strip-' + i);
    strip.style.transition = 'none';
    strip.style.transform  = `translateY(${-symbole.indexOf(ziel[i]) * h}px)`;
  }
  cb();
}

function aktualisiereZaehler(which) {
  document.getElementById('zaehler-' + which).textContent = which === 'a' ? gezogenA : gezogenB;
}

function sperreButtons(an) {
  document.querySelectorAll('.start-btn, .reset-btn, #btn-b').forEach(el => el.disabled = an);
}

function drehenEinzel(which) {
  if (laeuft) return;
  laeuft = true; sperreButtons(true);
  if (which === 'a') {
    const ziel = naechsteA(); aktualisiereZaehler('a');
    animiereStrip('raeder-a', ziffernSymbole, ziel, () => {
      letzteZiffern = ziel; zeigeAkkord(ziel);
      laeuft = false; sperreButtons(false); updateGeuebtBtn(); speichereState();
    });
  } else {
    // Pro: zufällige Auswahl von 4 verschiedenen Symbolen aus 10
    const ziel = zieheZufaelligePfeile();
    gezogenB++;
    aktualisiereZaehler('b');
    animiereStrip('raeder-b', pfeilSymbole, ziel, () => {
      letztePfeile = ziel;
      aktualisiereNotation(ziel);
      laeuft = false; sperreButtons(false); updateGeuebtBtn(); speichereState();
    });
  }
}

// ── Griffbild ────────────────────────────────────────────
const GRIFFBILDER = {
  dom7: [
    'assets/grafiken/d71111.png','assets/grafiken/d71120.png',
    'assets/grafiken/d71210.png','assets/grafiken/d71300.png',
    'assets/grafiken/d72200.png','assets/grafiken/d72210.png',
    'assets/grafiken/d73100.png','assets/grafiken/d74000.png',
  ],
  maj7: [
    'assets/grafiken/j71111.png','assets/grafiken/j71120.png',
    'assets/grafiken/j71210.png','assets/grafiken/j71300.png',
    'assets/grafiken/j72110.png','assets/grafiken/j72200.png',
    'assets/grafiken/j73100.png','assets/grafiken/j74000.png',
  ],
  moll7: [
    'assets/grafiken/m71111.png','assets/grafiken/m71120.png',
    'assets/grafiken/m71210.png','assets/grafiken/m71300.png',
    'assets/grafiken/m72110.png','assets/grafiken/m72200.png',
    'assets/grafiken/m73100.png','assets/grafiken/m74000.png',
  ],
  moll7b5: [
    'assets/grafiken/m7b51111.png','assets/grafiken/m7b51120.png',
    'assets/grafiken/m7b51210.png','assets/grafiken/m7b51300.png',
    'assets/grafiken/m7b52110.png','assets/grafiken/m7b52200.png',
    'assets/grafiken/m7b53100.png','assets/grafiken/m7b54000.png',
  ],
};
let letzterGriffbildIdx = -1;

function zeigeGriffbild() {
  const liste = GRIFFBILDER[aktuellerTyp];
  let idx;
  do { idx = Math.floor(Math.random() * liste.length); }
  while (liste.length > 1 && idx === letzterGriffbildIdx);
  letzterGriffbildIdx = idx;

  const img  = document.getElementById('griffbild-img');
  const leer = document.getElementById('griffbild-leer');
  img.style.opacity = '0';
  img.src = liste[idx];
  leer.style.display = 'none';
  img.style.display  = 'block';
  img.onload = () => requestAnimationFrame(() => { img.style.opacity = '1'; });
  speichereState();
}

// ── Geübt ────────────────────────────────────────────────
function updateGeuebtBtn() {
  document.getElementById('btn-geuebt').disabled = !(letzteZiffern && letztePfeile);
}

function zeitstempel() {
  const d = new Date();
  return `${String(d.getDate()).padStart(2,'0')}.${String(d.getMonth()+1).padStart(2,'0')}. ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

function markiereGeuebt() {
  if (!letzteZiffern || !letztePfeile) return;

  // Einfacher Zähler pro Akkordtyp (kein 576er-Raster, da 5040 Pfeil-Kombinationen)
  const PRO_KEY = 'gitueben_pro_geuebt';
  let zaehler = {};
  try { zaehler = JSON.parse(localStorage.getItem(PRO_KEY) || '{}'); } catch(e) {}
  zaehler[aktuellerTyp] = (zaehler[aktuellerTyp] || 0) + 1;
  localStorage.setItem(PRO_KEY, JSON.stringify(zaehler));

  const btn = document.getElementById('btn-geuebt');
  btn.textContent = '✓ Gespeichert';
  btn.style.cssText = 'background:var(--accent2);color:#fff;border-color:var(--accent2)';
  setTimeout(() => { btn.textContent = '✓ Geübt'; btn.style.cssText = ''; }, 1800);
}

// ── Rhythmische Notation ─────────────────────────────────
// Ein Kästchen = 1 Viertelnotenwert
// len 1 (↑/↓)         → Achtelpause  + Sechzehntelpause + 1 Sechzehntelnote
// len 2 (↑↑ etc.)     → Achtelpause  + 2 beamed Sechzehntelnoten
// len 3 (↓↓↑ etc.)    → Sechzehntelpause + 3 beamed Sechzehntelnoten
function notationSVG(symbol) {
  const ink = 'currentColor';

  // ── Noten-Bausteine ──────────────────────────────────
  const nh = (cx) =>
    `<ellipse cx="${cx}" cy="36" rx="5" ry="3.5" transform="rotate(-15 ${cx} 36)" fill="${ink}"/>`;

  const st = (cx) =>
    `<line x1="${cx+4.5}" y1="36" x2="${cx+4.5}" y2="14" stroke="${ink}" stroke-width="1.5"/>`;

  // Zwei Fähnchen für Sechzehntelnote (Einzelnote)
  const fl = (cx) => {
    const x = cx + 4.5;
    return `<path d="M ${x},14 C ${x+11},17 ${x+11},26 ${x+1},29" stroke="${ink}" stroke-width="1.5" fill="none" stroke-linecap="round"/>` +
           `<path d="M ${x},20 C ${x+11},23 ${x+11},32 ${x+1},35" stroke="${ink}" stroke-width="1.5" fill="none" stroke-linecap="round"/>`;
  };

  // Doppelbalken für beamed Sechzehntelnoten
  const bm = (cx1, cx2) =>
    `<rect x="${cx1+4.5}" y="14"  width="${cx2-cx1}" height="3.5" fill="${ink}"/>` +
    `<rect x="${cx1+4.5}" y="20"  width="${cx2-cx1}" height="3.5" fill="${ink}"/>`;

  // ── Pausenzeichen (offizielle Unicode-Musikzeichen) ─────
  // U+1D13E 𝄾 = Achtelpause     → Noto Sans Symbols 2 (Google Fonts)
  // U+1D13F 𝄿 = Sechzehntelpause
  // CSS-Klasse .nrest liefert den richtigen Font; \u{...} ist sichere ES6-Notation
  const er = (x, sz=26) =>
    `<text x="${x}" y="38" font-size="${sz}" class="nrest" fill="${ink}">\u{1D13E}</text>`;
  const sr = (x, sz=26) =>
    `<text x="${x}" y="38" font-size="${sz}" class="nrest" fill="${ink}">\u{1D13F}</text>`;

  // ── Zusammensetzen je Pfeil-Typ ──────────────────────
  let inner = '';
  const len = symbol.length;

  if (len === 1) {
    // Achtelpause | Sechzehntelpause | Sechzehntelnote
    inner = er(2, 22) + sr(20, 22) + nh(55) + st(55) + fl(55);
  } else if (len === 2) {
    // Achtelpause | 2 beamed Sechzehntelnoten
    inner = er(2) + nh(36) + st(36) + nh(58) + st(58) + bm(36, 58);
  } else {
    // Sechzehntelpause | 3 beamed Sechzehntelnoten
    inner = sr(2) + nh(26) + st(26) + nh(46) + st(46) + nh(65) + st(65) + bm(26, 65);
  }

  return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 88 54" style="display:block">${inner}</svg>`;
}

function erstelleNotationsBoxen() {
  const container = document.getElementById('notation-b');
  container.innerHTML = '';
  for (let i = 0; i < 4; i++) {
    const box = document.createElement('div');
    box.className = 'notation-box leer';
    box.id = 'notation-box-' + i;
    container.appendChild(box);
  }
}

function aktualisiereNotation(pfeile) {
  pfeile.forEach((symbol, i) => {
    const box = document.getElementById('notation-box-' + i);
    if (!box) return;
    box.className = 'notation-box';
    box.innerHTML = notationSVG(symbol);
  });
}

// ── Init ─────────────────────────────────────────────────
// Ziffern: 4 Positionen, jede zeigt [1,3,5,7]
erstelleRad('raeder-a', 4, ziffernSymbole);
// Pfeile: genau 4 Positionen (wie Original), jede kann eines der 10 Symbole zeigen
erstelleRad('raeder-b', 4, pfeilSymbole);
erstelleNotationsBoxen();
erstellePills();

window.addEventListener('pageshow', (e) => {
  if (!e.persisted) ladeState();
});
</script>
