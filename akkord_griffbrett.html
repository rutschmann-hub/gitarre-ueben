<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Akkord-Griffbilder</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      background: #ffffff;
      color: #1a1a1a;
    }

    .akkord-widget {
      width: 100%;
      padding: 0.75rem 0.6rem 0.4rem;
    }

    .control-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 0.7rem;
      flex-wrap: wrap;
    }
    .control-row label {
      font-size: 13px;
      font-weight: 500;
      color: #555;
      white-space: nowrap;
    }
    select {
      font-size: 13px;
      padding: 5px 8px;
      border-radius: 6px;
      border: 1px solid #ccc;
      background: #fff;
      color: #1a1a1a;
      cursor: pointer;
    }
    select:hover { border-color: #888; }
    select:focus { outline: 2px solid #185FA5; outline-offset: 1px; }

    .nav-btn {
      padding: 5px 12px;
      border-radius: 6px;
      border: 1px solid #ccc;
      background: #f5f5f5;
      color: #1a1a1a;
      cursor: pointer;
      font-size: 14px;
      line-height: 1;
    }
    .nav-btn:hover { background: #e8e8e8; }
    .nav-btn:active { transform: scale(0.97); }

    .badge {
      font-size: 15px;
      font-weight: 600;
      color: #1a1a1a;
      background: #f0f0f0;
      border: 1px solid #ccc;
      padding: 4px 13px;
      border-radius: 6px;
      min-width: 44px;
      text-align: center;
    }

    .legend {
      display: flex;
      gap: 16px;
      margin-bottom: 0.7rem;
      flex-wrap: wrap;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      color: #555;
    }
    .legend-dot {
      width: 13px;
      height: 13px;
      border-radius: 50%;
      border: 1.5px solid #185FA5;
      background: #B5D4F4;
      flex-shrink: 0;
    }
    .legend-dot.root { border-width: 2.8px; }

    #akkord-fb { width: 100%; height: auto; display: block; }
    .fb-scroll { overflow-x: auto; }

    .akkord-desc {
      margin-top: 0.4rem;
      font-size: 12px;
      color: #888;
      text-align: center;
    }

    .inv-btn {
      padding: 4px 11px;
      border-radius: 5px;
      border: 1px solid #ccc;
      background: #f5f5f5;
      color: #555;
      cursor: pointer;
      font-size: 12px;
      font-family: monospace;
      font-weight: 600;
      letter-spacing: 0.03em;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .inv-btn:hover { border-color: #888; }
    .inv-btn.inv-aktiv-0 { background: #185FA5; color: #fff; border-color: #185FA5; }
    .inv-btn.inv-aktiv-1 { background: #C76B00; color: #fff; border-color: #C76B00; }
    .legend-dot.inv { border-color: #C76B00; background: #FDE8C0; }

    @media (prefers-color-scheme: dark) {
      body { background: #1e1a17; color: #e8e8e8; }
      select { background: #2a2520; color: #e8e8e8; border-color: #444; }
      .control-row label { color: #aaa; }
      .nav-btn { background: #2a2520; color: #e8e8e8; border-color: #444; }
      .nav-btn:hover { background: #333; }
      .badge { background: #2a2520; color: #e8e8e8; border-color: #444; }
      .legend-item { color: #aaa; }
      .akkord-desc { color: #666; }
    }
  </style>
</head>
<body>

<div class="akkord-widget">

  <div class="control-row">
    <label for="chordSel">Akkord:</label>
    <select id="chordSel" onchange="onChordChange()">
      <option value="dom7">Dominant 7 (1 3 5 ♭7)</option>
      <option value="maj7">Major 7 (1 3 5 7)</option>
      <option value="min7">Moll 7 (1 ♭3 5 ♭7)</option>
      <option value="min7b5">Moll 7♭5 (1 ♭3 ♭5 ♭7)</option>
    </select>
    <div id="inv-row" style="display:flex;gap:4px;align-items:center;margin-left:10px">
      <label style="font-size:13px;font-weight:500;color:#555;white-space:nowrap">Umkehrung:</label>
      <button id="inv-btn-0" class="inv-btn inv-aktiv-0" onclick="setInversion(0)">1 3 5 7</button>
      <button id="inv-btn-1" class="inv-btn" onclick="setInversion(1)">3 5 7 1</button>
    </div>
  </div>

  <div class="control-row">
    <label for="groupSel">Saite:</label>
    <select id="groupSel" onchange="onGroupChange()">
      <option value="1">1 — Tiefe E-Saite</option>
      <option value="2" selected>2 — A-Saite</option>
      <option value="3">3 — D-Saite</option>
      <option value="4">4 — G-Saite</option>
      <option value="5">5 — H-Saite</option>
      <option value="6">6 — Hohe E-Saite</option>
    </select>
    <label for="shpSel">Griffbild:</label>
    <select id="shpSel" onchange="onShpChange()"></select>
    <button class="nav-btn" onclick="nav(-1)" aria-label="Vorheriges Griffbild">←</button>
    <button class="nav-btn" onclick="nav(1)"  aria-label="Nächstes Griffbild">→</button>
    <span class="badge" id="badge">2A</span>
    <label for="labelSel" style="margin-left:8px">Anzeige:</label>
    <select id="labelSel" onchange="render()">
      <option value="iv">Intervall (1 ♭3 5 …)</option>
      <option value="tone">Akkordton (C E G …)</option>
    </select>
  </div>

  <div class="legend" id="legendBox"></div>

  <div class="fb-scroll">
    <svg id="akkord-fb" viewBox="0 0 760 240" style="min-width:560px"></svg>
  </div>

  <p class="akkord-desc" id="akkord-desc"></p>

</div>

<script>
// ── Konstanten ─────────────────────────────────────────────────
const FC         = 18;   // Anzahl Bünde
const OPEN_STR   = ['E','H','G','D','A','E'];  // SVG row 0=hoch-E … 5=tief-E
const NOTES_FLAT = ['C','Db','D','Eb','E','F','Gb','G','Ab','A','Bb','B'];
const OPEN_SEMI  = [4, 11, 7, 2, 9, 4];  // Halbtonabstand der leeren Saite von C
const NOTES_SEMI = {C:0,Db:1,D:2,Eb:3,E:4,F:5,Gb:6,G:7,Ab:8,A:9,Bb:10,B:11};

// Halbtonabstand zwischen zwei SVG-Zeilen (höher/tiefer)
function semisBetween(rootRow, targetRow) {
  const steps = [5, 4, 5, 5, 5]; // row0→1=5, row1→2=4, row2→3=5, row3→4=5, row4→5=5
  let s = 0;
  if (targetRow < rootRow) {
    for (let r = targetRow; r < rootRow; r++) s += steps[r];
  } else {
    for (let r = rootRow; r < targetRow; r++) s -= steps[r];
  }
  return s;
}

// ── Akkordtypen ────────────────────────────────────────────────
const CHORD_TYPES = {
  dom7:   { name: 'Dom7',     ivs: ['1','3','5','b7'],   semis: [0,4,7,10] },
  maj7:   { name: 'Maj7',     ivs: ['1','3','5','7'],    semis: [0,4,7,11] },
  min7:   { name: 'Moll7',    ivs: ['1','b3','5','b7'],  semis: [0,3,7,10] },
  min7b5: { name: 'Moll7♭5', ivs: ['1','b3','b5','b7'], semis: [0,3,6,10] },
};

// ── Shape-Definitionen ─────────────────────────────────────────
// sd = Saitenoffset vom Root (negativ = dünner/höher), sl = Schlitz-Index im Akkord
const SHAPES_STD = [
  {id:'a', dots:[{sd:0,sl:0},{sd:0,sl:1},{sd:0,sl:2},{sd:0,sl:3}]},
  {id:'b', dots:[{sd:0,sl:0},{sd:0,sl:1},{sd:0,sl:2},{sd:-1,sl:3}]},
  {id:'c', dots:[{sd:0,sl:0},{sd:0,sl:1},{sd:-1,sl:2},{sd:-1,sl:3}]},
  {id:'d', dots:[{sd:0,sl:0},{sd:-2,sl:3},{sd:-1,sl:2},{sd:0,sl:1}]},
  {id:'e', dots:[{sd:0,sl:0},{sd:-1,sl:1},{sd:-1,sl:2},{sd:-1,sl:3}]},
  {id:'f', dots:[{sd:0,sl:0},{sd:-1,sl:1},{sd:-2,sl:3},{sd:-1,sl:2}]},
  {id:'g', dots:[{sd:0,sl:0},{sd:-1,sl:1},{sd:-2,sl:2},{sd:-2,sl:3}]},
  {id:'h', dots:[{sd:0,sl:0},{sd:-1,sl:1},{sd:-2,sl:2},{sd:-3,sl:3}]},
];
const SHAPES_MIN7 = [
  {id:'a', dots:[{sd:0,sl:0},{sd:0,sl:1},{sd:0,sl:2},{sd:0,sl:3}]},
  {id:'b', dots:[{sd:0,sl:0},{sd:0,sl:1},{sd:0,sl:2},{sd:-1,sl:3}]},
  {id:'c', dots:[{sd:0,sl:0},{sd:0,sl:1},{sd:-1,sl:2},{sd:-1,sl:3}]},
  {id:'d', dots:[{sd:0,sl:0},{sd:0,sl:1},{sd:-1,sl:2},{sd:-2,sl:3}]},
  {id:'e', dots:[{sd:0,sl:0},{sd:-1,sl:1},{sd:-1,sl:2},{sd:-1,sl:3}]},
  {id:'f', dots:[{sd:0,sl:0},{sd:-1,sl:1},{sd:-1,sl:2},{sd:-2,sl:3}]},
  {id:'g', dots:[{sd:0,sl:0},{sd:-1,sl:1},{sd:-2,sl:2},{sd:-2,sl:3}]},
  {id:'h', dots:[{sd:0,sl:0},{sd:-1,sl:1},{sd:-2,sl:2},{sd:-3,sl:3}]},
];
const SHAPES_BY_CHORD = {
  dom7: SHAPES_STD, maj7: SHAPES_STD, min7: SHAPES_MIN7, min7b5: SHAPES_STD,
};

// 1. Umkehrung: sl:1 (Terz) liegt auf der Wurzelsaite (sd:0),
// sl:0 (Root) wandert – identische Saitenverteilungen wie SHAPES_STD
// aber der Root belegt die "letzte" Position jeder Verteilung
const SHAPES_INV1 = [
  {id:'a', dots:[{sd:0,sl:1},{sd:0,sl:2},{sd:0,sl:3},{sd:0, sl:0}]},  // 4-0-0-0
  {id:'b', dots:[{sd:0,sl:1},{sd:0,sl:2},{sd:0,sl:3},{sd:-1,sl:0}]},  // 3-1-0-0
  {id:'c', dots:[{sd:0,sl:1},{sd:0,sl:2},{sd:-1,sl:3},{sd:-1,sl:0}]}, // 2-2-0-0
  {id:'d', dots:[{sd:0,sl:1},{sd:0,sl:2},{sd:-1,sl:3},{sd:-2,sl:0}]}, // 2-1-1-0
  {id:'e', dots:[{sd:0,sl:1},{sd:-1,sl:2},{sd:-1,sl:3},{sd:-1,sl:0}]},// 1-3-0-0
  {id:'f', dots:[{sd:0,sl:1},{sd:-1,sl:2},{sd:-1,sl:3},{sd:-2,sl:0}]},// 1-2-1-0
  {id:'g', dots:[{sd:0,sl:1},{sd:-1,sl:2},{sd:-2,sl:3},{sd:-2,sl:0}]},// 1-1-2-0
  {id:'h', dots:[{sd:0,sl:1},{sd:-1,sl:2},{sd:-2,sl:3},{sd:-3,sl:0}]},// 1-1-1-1
];

// Alle Gruppen mit count=8; isShapeValid filtert physisch unmögliche raus
const GROUPS = {
  '1': { prefix:'1', rs:5, count:8 },
  '2': { prefix:'2', rs:4, count:8 },
  '3': { prefix:'3', rs:3, count:8 },
  '4': { prefix:'4', rs:2, count:8 },
  '5': { prefix:'5', rs:1, count:8 },
  '6': { prefix:'6', rs:0, count:8 },
};

// ── Zustand ────────────────────────────────────────────────────
let curChord   = 'dom7';
let curGroup   = '2';
let curShpIdx  = 0;
let curGrundton = 'C';
let curInversion = 0; // 0 = Grundstellung (1 3 5 7), 1 = Erste Umkehrung (3 5 7 1)

function getShapes() {
  if (curInversion === 1) return SHAPES_INV1;
  return SHAPES_BY_CHORD[curChord];
}
function ivDisp(iv)  { return iv.replace(/b/g, '♭'); }

// Intervall eines Slots relativ zum Bass-Slot der Umkehrung (negativ → +12)
function invInterval(sl, semis) {
  const diff = semis[sl] - semis[curInversion];
  return diff < 0 ? diff + 12 : diff;
}

// Bund des Bass-Tons (abhängig von Umkehrung) auf Saite rs
function calcBassFret(rs) {
  const chord = CHORD_TYPES[curChord];
  const bassNoteSemi = (NOTES_SEMI[curGrundton] + chord.semis[curInversion]) % 12;
  const diff = (bassNoteSemi - OPEN_SEMI[rs] + 12) % 12;
  return diff === 0 ? 12 : diff;
}

// Prüft ob alle 4 Punkte des Shapes auf dem Griffbrett liegen (Bund 1–FC)
function isShapeValid(shpIdx, rs) {
  const bassFret = calcBassFret(rs);
  const shape    = getShapes()[shpIdx];
  const chord    = CHORD_TYPES[curChord];
  for (const d of shape.dots) {
    const targetRow = rs + d.sd;
    if (targetRow < 0 || targetRow > 5) return false;
    const fret = bassFret + invInterval(d.sl, chord.semis) - semisBetween(rs, targetRow);
    if (fret < 1 || fret > FC) return false;
  }
  return true;
}

// Gibt alle gültigen Shape-Indizes für aktuelle Gruppe zurück
function validShapeIndices() {
  const grp = GROUPS[curGroup];
  const res = [];
  for (let i = 0; i < grp.count; i++) {
    if (isShapeValid(i, grp.rs)) res.push(i);
  }
  return res;
}

// Berechnet Punkte (nur gültige)
function computeDots(shpIdx, rs) {
  const bassFret = calcBassFret(rs);
  const shape    = getShapes()[shpIdx];
  const chord    = CHORD_TYPES[curChord];
  return shape.dots.map(d => {
    const targetRow = rs + d.sd;
    if (targetRow < 0 || targetRow > 5) return null;
    const fret = bassFret + invInterval(d.sl, chord.semis) - semisBetween(rs, targetRow);
    if (fret < 1 || fret > FC) return null;
    return { s: targetRow, f: fret, iv: chord.ivs[d.sl] };
  }).filter(Boolean);
}

// ── UI aufbauen ────────────────────────────────────────────────
function buildLegend() {
  const box    = document.getElementById('legendBox');
  box.innerHTML = '';
  const labels = ['(Root)', '(Terz)', '(Quinte)', '(Septime)'];
  CHORD_TYPES[curChord].ivs.forEach((iv, i) => {
    const div = document.createElement('div'); div.className = 'legend-item';
    const dot = document.createElement('div'); dot.className = 'legend-dot' + (i === curInversion ? (curInversion === 0 ? ' root' : ' inv') : '');
    div.appendChild(dot);
    const sp = document.createElement('span');
    sp.textContent = ivDisp(iv) + ' ' + labels[i];
    div.appendChild(sp);
    box.appendChild(div);
  });
}

function buildShpSel() {
  const sel    = document.getElementById('shpSel');
  sel.innerHTML = '';
  const grp    = GROUPS[curGroup];
  const shapes = getShapes();
  const valid  = validShapeIndices();

  // Wenn aktueller Shape nicht mehr gültig: ersten gültigen nehmen
  if (!valid.includes(curShpIdx)) {
    curShpIdx = valid.length > 0 ? valid[0] : 0;
  }

  valid.forEach(i => {
    const o = document.createElement('option');
    o.value = i;
    o.textContent = (grp.prefix + shapes[i].id).toUpperCase();
    if (i === curShpIdx) o.selected = true;
    sel.appendChild(o);
  });
}

// ── SVG Rendering ──────────────────────────────────────────────
function render() {
  const grp    = GROUPS[curGroup];
  const rs     = grp.rs;
  const shapes = getShapes();
  const valid  = validShapeIndices();

  // Aktuellen Shape sicherstellen
  if (!valid.includes(curShpIdx) && valid.length > 0) curShpIdx = valid[0];

  const hasShape = valid.includes(curShpIdx);
  const shape    = hasShape ? shapes[curShpIdx] : null;
  const label    = shape ? (grp.prefix + shape.id).toUpperCase() : '–';
  const bassFret = calcBassFret(rs);
  const strNames = ['hoch-E','H','G','D','A','tief-E'];
  const labelMode= document.getElementById('labelSel').value;
  const invLabel = curInversion === 0 ? 'Grundstellung' : '1. Umkehrung';
  const dotFill   = curInversion === 0 ? '#B5D4F4' : '#FDE8C0';
  const dotStroke = curInversion === 0 ? '#185FA5' : '#C76B00';
  const hlFill    = curInversion === 0 ? '#e8f0fb' : '#FEF3E2';
  const txtColor  = curInversion === 0 ? '#185FA5' : '#7A3A00';

  document.getElementById('badge').textContent = label;
  document.getElementById('akkord-desc').textContent = valid.length === 0
    ? `Kein Griffbild für ${curGrundton} auf ${strNames[rs]}-Saite (Bundlage außerhalb 1–${FC})`
    : `${CHORD_TYPES[curChord].name} · ${curGrundton} · ${invLabel} · ${strNames[rs]}-Saite Bund ${bassFret} · Lage ${label}`;

  // SVG-Dimensionen: FC=18, L=26 (wenig links-Abstand)
  const svg = document.getElementById('akkord-fb');
  const W=760, H=240, L=16, R=W-4, T=24, B=H-22, SC=6;
  const fW = (R-L)/FC;
  const sH = (B-T)/(SC-1);
  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
  svg.innerHTML = '';
  const ap = e => svg.appendChild(e);

  // Sattel
  ap(mk('rect', {x:L-4, y:T-2, width:5, height:(SC-1)*sH+4, fill:'#555'}));

  // Bundlinien
  for (let f = 0; f <= FC; f++) {
    ap(mk('line', {x1:L+f*fW, y1:T, x2:L+f*fW, y2:B,
      stroke:'#888', 'stroke-width': f===0 ? 2 : 0.7, opacity:0.5}));
  }

  // Saiten
  const tk = [1.2, 1.1, 1.0, 1.6, 1.9, 2.2];
  for (let s = 0; s < SC; s++) {
    ap(mk('line', {x1:L-4, y1:T+s*sH, x2:R, y2:T+s*sH,
      stroke:'#444', 'stroke-width':tk[s], opacity:0.4}));
  }

  // Bundmarkierungen (Inlays)
  for (const f of [3,5,7,9,12,15,17]) {
    const cx = L + (f-0.5)*fW;
    if (f === 12) {
      [1.5, 3.5].forEach(o => ap(mk('circle', {cx, cy:T+o*sH, r:4.5, fill:'#ccc'})));
    } else {
      ap(mk('circle', {cx, cy:T+2.5*sH, r:4.5, fill:'#ccc'}));
    }
    ap(tx(String(f), cx, B+13, 9, '#aaa', 'middle'));
  }

  // Saitenbeschriftungen (links vom Sattel)
  for (let s = 0; s < SC; s++) {
    const t = tx(OPEN_STR[s], L-8,  T+s*sH+4, 10, '#666', 'middle');
    t.setAttribute('font-weight', '600');
    ap(t);
  }

  if (!hasShape) return;

  // Punkte berechnen
  const dots = computeDots(curShpIdx, rs);
  if (!dots.length) return;

  // Highlight-Zone hinter den Punkten
  const frets = dots.map(d => d.f);
  const lo = Math.min(...frets), hi = Math.max(...frets);
  const hx1 = Math.max(L, L+(lo-1)*fW);
  const hx2 = Math.min(R, L+hi*fW);
  if (hx2 > hx1) {
    const bg = mk('rect', {x:hx1, y:T-4, width:hx2-hx1,
      height:(SC-1)*sH+8, fill:hlFill, rx:4, opacity:0.7});
    svg.insertBefore(bg, svg.firstChild);
  }

  // Punkte zeichnen
  dots.forEach(d => {
    const cx = L + (d.f-0.5)*fW;
    const cy = T + d.s*sH;
    const isRoot = d.iv === '1'; // Grundton immer hervorheben, unabhängig von der Umkehrung
    ap(mk('circle', {cx, cy, r:10, fill:dotFill,
      stroke:dotStroke, 'stroke-width': isRoot ? 2.8 : 1.5}));
    let lbl;
    if (labelMode === 'tone') {
      lbl = NOTES_FLAT[(OPEN_SEMI[d.s] + d.f) % 12];
    } else {
      lbl = ivDisp(d.iv);
    }
    const fs = lbl.length > 2 ? 7.5 : lbl.length > 1 ? 8.5 : 9.5;
    const tl = tx(lbl, cx, cy+3.5, fs, txtColor, 'middle');
    tl.setAttribute('font-weight', '500');
    ap(tl);
  });
}

// ── SVG-Helfer ─────────────────────────────────────────────────
function mk(tag, attrs) {
  const e = document.createElementNS('http://www.w3.org/2000/svg', tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  return e;
}
function tx(content, x, y, fs, fill, anchor) {
  const e = document.createElementNS('http://www.w3.org/2000/svg', 'text');
  e.setAttribute('x', x); e.setAttribute('y', y);
  e.setAttribute('font-size', fs); e.setAttribute('fill', fill);
  e.setAttribute('text-anchor', anchor);
  e.textContent = content;
  return e;
}

// ── Event-Handler (manuelle Bedienung) ────────────────────────
function setInversion(n) {
  curInversion = n;
  document.querySelectorAll('.inv-btn').forEach((b, i) => {
    b.classList.remove('inv-aktiv-0', 'inv-aktiv-1');
    if (i === n) b.classList.add('inv-aktiv-' + n);
  });
  // curShpIdx bleibt – buildShpSel() prüft Gültigkeit und passt ggf. an
  buildShpSel(); render();
}

function onChordChange() {
  curChord = document.getElementById('chordSel').value;
  curShpIdx = 0;
  const invRow = document.getElementById('inv-row');
  if (curChord !== 'dom7') {
    curInversion = 0;
    document.querySelectorAll('.inv-btn').forEach((b, i) => {
      b.classList.remove('inv-aktiv-0', 'inv-aktiv-1');
      if (i === 0) b.classList.add('inv-aktiv-0');
    });
    if (invRow) invRow.style.display = 'none';
  } else {
    if (invRow) invRow.style.display = 'flex';
  }
  buildLegend(); buildShpSel(); render();
}
function onGroupChange() {
  curGroup = document.getElementById('groupSel').value;
  curShpIdx = 0;
  buildShpSel(); render();
}
function onShpChange() {
  curShpIdx = +document.getElementById('shpSel').value;
  render();
}
function nav(dir) {
  const valid = validShapeIndices();
  if (!valid.length) return;
  const pos = valid.indexOf(curShpIdx);
  const next = (pos + dir + valid.length) % valid.length;
  curShpIdx = valid[next];
  buildShpSel(); render();
}

// ── Sync vom Elternfenster (akkord-bandit.html) ───────────────
// Elternseite schickt { chord: 'dom7'|'maj7'|'moll7'|'moll7b5', grundton: 'C'…'B' }
const CHORD_MAP = { dom7:'dom7', maj7:'maj7', moll7:'min7', moll7b5:'min7b5' };
window.addEventListener('message', (e) => {
  const data = e.data || {};
  let changed = false;
  if (data.chord && CHORD_MAP[data.chord] && CHORD_MAP[data.chord] !== curChord) {
    curChord = CHORD_MAP[data.chord];
    document.getElementById('chordSel').value = curChord;
    changed = true;
  }
  if (data.grundton && NOTES_SEMI[data.grundton] !== undefined && data.grundton !== curGrundton) {
    curGrundton = data.grundton;
    changed = true;
  }
  if (changed) {
    // Shape nur zurücksetzen wenn er durch die neue Konstellation ungültig wird;
    // buildShpSel() erledigt das automatisch – kein harter Reset auf 0
    buildLegend(); buildShpSel(); render();
  }
});

// ── Init ───────────────────────────────────────────────────────
buildLegend();
buildShpSel();
render();
</script>
</body>
</html>
