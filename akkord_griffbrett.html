<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Akkord-Griffbilder</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      background: #ffffff;
      color: #1a1a1a;
    }

    .akkord-widget {
      width: 100%;
      padding: 0.5rem 0.6rem 0.25rem;
    }

    select {
      font-size: 13px;
      padding: 5px 8px;
      border-radius: 6px;
      border: 1px solid #ccc;
      background: #fff;
      color: #1a1a1a;
      cursor: pointer;
    }
    select:hover { border-color: #888; }
    select:focus { outline: 2px solid #185FA5; outline-offset: 1px; }

    .nav-btn {
      padding: 5px 12px;
      border-radius: 6px;
      border: 1px solid #ccc;
      background: #f5f5f5;
      color: #1a1a1a;
      cursor: pointer;
      font-size: 14px;
      line-height: 1;
    }
    .nav-btn:hover { background: #e8e8e8; }
    .nav-btn:active { transform: scale(0.97); }

    .badge {
      font-size: 15px;
      font-weight: 600;
      color: #1a1a1a;
      background: #f0f0f0;
      border: 1px solid #ccc;
      padding: 4px 13px;
      border-radius: 6px;
      min-width: 44px;
      text-align: center;
    }

    .legend {
      display: flex;
      gap: 16px;
      margin-bottom: 0.45rem;
      flex-wrap: wrap;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      color: #555;
    }
    .legend-dot {
      width: 13px;
      height: 13px;
      border-radius: 50%;
      border: 1.5px solid #185FA5;
      background: #B5D4F4;
      flex-shrink: 0;
    }
    .legend-dot.root { border-width: 2.8px; }

    #akkord-fb { width: 100%; height: auto; display: block; }
    .fb-scroll { overflow-x: auto; }

    .akkord-desc {
      margin-top: 0.2rem;
      font-size: 12px;
      color: #888;
      text-align: center;
    }

    .inv-btn {
      padding: 4px 11px;
      border-radius: 5px;
      border: 1px solid #ccc;
      background: #f5f5f5;
      color: #555;
      cursor: pointer;
      font-size: 12px;
      font-family: monospace;
      font-weight: 600;
      letter-spacing: 0.03em;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .inv-btn:hover { border-color: #888; }
    #inv-btn-0 { border-color:#185FA5; color:#185FA5; background:rgba(24,95,165,.07); }
    #inv-btn-1 { border-color:#C76B00; color:#C76B00; background:rgba(199,107,0,.07); }
    #inv-btn-2 { border-color:#1A7A42; color:#1A7A42; background:rgba(26,122,66,.07); }
    #inv-btn-3 { border-color:#7B2FBE; color:#7B2FBE; background:rgba(123,47,190,.07); }
    .inv-btn.inv-aktiv-0 { background: #185FA5; color: #fff; border-color: #185FA5; }
    .inv-btn.inv-aktiv-1 { background: #C76B00; color: #fff; border-color: #C76B00; }
    .inv-btn.inv-aktiv-2 { background: #1A7A42; color: #fff; border-color: #1A7A42; }
    .inv-btn.inv-aktiv-3 { background: #7B2FBE; color: #fff; border-color: #7B2FBE; }
    .legend-dot.inv  { border-color: #C76B00; background: #FDE8C0; }
    .legend-dot.inv2 { border-color: #1A7A42; background: #BAECD1; }
    .legend-dot.inv3 { border-color: #7B2FBE; background: #EBD5F8; }

    .ctx-btn {
      padding: 4px 9px; border-radius: 5px; border: 1.5px solid #ccc;
      background: #f5f5f5; cursor: pointer; font-size: 13px; font-weight: 700;
      transition: all 0.15s;
    }
    .ctx-btn:hover { border-color: #888; }
    #ctx-btn-0 { border-color:#185FA5; color:#185FA5; background:rgba(24,95,165,.07); }
    #ctx-btn-1 { border-color:#C76B00; color:#C76B00; background:rgba(199,107,0,.07); }
    #ctx-btn-2 { border-color:#1A7A42; color:#1A7A42; background:rgba(26,122,66,.07); }
    #ctx-btn-3 { border-color:#7B2FBE; color:#7B2FBE; background:rgba(123,47,190,.07); }
    /* Lage 5 = Oktav-Wiederholung von Lage 1 → gleiche Farbe (blau), gestrichelt */
    #ctx-btn-4 { border-color:#185FA5; color:#185FA5; background:rgba(24,95,165,.07); border-style:dashed; }
    .ctx-btn.ctx-aktiv-0 { background:#185FA5; color:#fff; border-color:#185FA5; }
    .ctx-btn.ctx-aktiv-1 { background:#C76B00; color:#fff; border-color:#C76B00; }
    .ctx-btn.ctx-aktiv-2 { background:#1A7A42; color:#fff; border-color:#1A7A42; }
    .ctx-btn.ctx-aktiv-3 { background:#7B2FBE; color:#fff; border-color:#7B2FBE; }
    .ctx-btn.ctx-aktiv-4 { background:#185FA5; color:#fff; border-color:#185FA5; }

    .ctrl-lbl {
      font-size: 12px; font-weight: 600; color: #666; white-space: nowrap;
      text-transform: uppercase; letter-spacing: 0.05em;
    }
    .controls-wrap {
      display: flex; gap: 14px; align-items: flex-start;
      flex-wrap: wrap; margin-bottom: 0.45rem;
    }
    .nav-grid {
      display: grid;
      grid-template-columns: 70px 28px 82px 28px;
      gap: 5px; align-items: center;
    }
    #grundton-sel {
      font-weight: 600; color: #185FA5; background: #f0f4ff;
      padding: 4px 4px; width: 100%;
      text-align: center; text-align-last: center;
    }
    .nav-grid .badge { text-align: center; }
    .ctrl-div-v {
      width: 1px; background: #ddd; align-self: stretch; flex-shrink: 0;
    }
    .btn-stack { display: flex; flex-direction: column; gap: 5px; }
    .btn-row { display: flex; align-items: center; gap: 5px; }
    .btn-row .ctrl-lbl { width: 84px; flex-shrink: 0; }

    @media (prefers-color-scheme: dark) {
      body { background: #1e1a17; color: #e8e8e8; }
      select { background: #2a2520; color: #e8e8e8; border-color: #444; }
.nav-btn { background: #2a2520; color: #e8e8e8; border-color: #444; }
      .nav-btn:hover { background: #333; }
      .badge { background: #2a2520; color: #e8e8e8; border-color: #444; }
      .legend-item { color: #aaa; }
      .akkord-desc { color: #666; }
    }

    @media (max-width: 540px) {
      .akkord-widget { padding: 0.4rem 0.4rem 0.2rem; }
      .controls-wrap { gap: 8px; }
      .ctrl-div-v { display: none; }
      .nav-grid { flex: 1 1 100%; grid-template-columns: 58px 26px 1fr 26px; gap: 4px; }
      .ctrl-lbl { font-size: 10px; letter-spacing: 0.03em; }
      .btn-row .ctrl-lbl { width: 62px; }
      .nav-btn { padding: 5px 9px; font-size: 13px; }
      .badge { font-size: 13px; padding: 4px 8px; min-width: 0; }
      .inv-btn { padding: 4px 7px; }
      .ctx-btn { padding: 3px 7px; font-size: 12px; }
    }
  </style>
</head>
<body>

<div class="akkord-widget">

  <div class="controls-wrap">

    <!-- Grundton + Akkord + Saite im ausgerichteten Grid -->
    <div class="nav-grid">
      <span class="ctrl-lbl">Grundton</span>
      <button class="nav-btn" onclick="navGrundton(-1)" aria-label="Grundton einen Halbton tiefer">←</button>
      <select id="grundton-sel" onchange="setGrundtonSel(this.value)" aria-label="Grundton wählen"></select>
      <button class="nav-btn" onclick="navGrundton(1)" aria-label="Grundton einen Halbton höher">→</button>

      <span class="ctrl-lbl">Akkord</span>
      <button class="nav-btn" onclick="navChord(-1)" aria-label="Vorheriger Akkordtyp">←</button>
      <span class="badge" id="chord-badge">Dom7</span>
      <button class="nav-btn" onclick="navChord(1)" aria-label="Nächster Akkordtyp">→</button>

      <span class="ctrl-lbl">Saite</span>
      <button class="nav-btn" onclick="navSaite(-1)" aria-label="Vorherige Saitengruppe">←</button>
      <span class="badge" id="saite-badge">A</span>
      <button class="nav-btn" onclick="navSaite(1)" aria-label="Nächste Saitengruppe">→</button>
    </div>

    <div class="ctrl-div-v"></div>

    <!-- Umkehrung + Griffbild untereinander -->
    <div class="btn-stack" id="griffbild-stack">
      <div class="btn-row" id="umkehrung-row">
        <span class="ctrl-lbl">Umkehrung</span>
        <button id="inv-btn-0" class="inv-btn inv-aktiv-0" onclick="setInversion(0)">1 3 5 7</button>
        <button id="inv-btn-1" class="inv-btn" onclick="setInversion(1)">3 5 7 1</button>
        <button id="inv-btn-2" class="inv-btn" onclick="setInversion(2)">5 7 1 3</button>
        <button id="inv-btn-3" class="inv-btn" onclick="setInversion(3)">7 1 3 5</button>
      </div>
      <div class="btn-row">
        <span class="ctrl-lbl">Griffbild</span>
        <button class="nav-btn" onclick="nav(-1)" aria-label="Vorheriges Griffbild">←</button>
        <button class="nav-btn" onclick="nav(1)" aria-label="Nächstes Griffbild">→</button>
        <span class="badge" id="badge">2A</span>
        <button class="nav-btn" id="anzeige-btn" onclick="toggleAnzeige()" style="margin-left:6px;min-width:72px;font-size:12px">Intervall</button>
      </div>
      <div class="btn-row" id="ctx-row">
        <span class="ctrl-lbl">Akkord</span>
        <button id="ctx-btn-0" class="ctx-btn" onclick="toggleCtxVoicing(0)">1</button>
        <button id="ctx-btn-1" class="ctx-btn" onclick="toggleCtxVoicing(1)">2</button>
        <button id="ctx-btn-2" class="ctx-btn" onclick="toggleCtxVoicing(2)">3</button>
        <button id="ctx-btn-3" class="ctx-btn" onclick="toggleCtxVoicing(3)">4</button>
        <button id="ctx-btn-4" class="ctx-btn" onclick="toggleCtxVoicing(4)" title="Lage 5 (Oktav-Wiederholung von Lage 1)">5</button>
        <button id="ctx-drop-btn" class="nav-btn" onclick="toggleCtxDropType()" title="Overlay Drop 2 / Drop 3" style="margin-left:6px;font-size:11px;font-weight:600;min-width:58px">Drop 2</button>
      </div>
    </div>

    <div class="ctrl-div-v"></div>
    <div class="btn-stack">
      <button class="nav-btn" id="mode-btn" onclick="toggleMode()" style="font-size:12px;font-weight:600;min-width:90px">Akkordbild</button>
      <button class="nav-btn" id="droptype-btn" onclick="toggleDropType()" title="Umschalten Drop 2 / Drop 3" style="font-size:12px;font-weight:600;min-width:90px;display:none">Drop 2</button>
    </div>

  </div>

  <div class="legend" id="legendBox"></div>

  <div class="fb-scroll">
    <svg id="akkord-fb" viewBox="0 0 760 240" style="min-width:560px"></svg>
  </div>

  <p class="akkord-desc" id="akkord-desc"></p>

</div>

<script>
// ── Konstanten ─────────────────────────────────────────────────
const FC         = 18;   // Anzahl Bünde
const OPEN_STR   = ['E','H','G','D','A','E'];  // SVG row 0=hoch-E … 5=tief-E
const NOTES_FLAT  = ['C','Db','D','Eb','E','F','Gb','G','Ab','A','Bb','B'];
const NOTES_SHARP = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];

// Voicing-/Umkehrungsfarben – zentral, von Drop- und Griffbild-Rendering genutzt
const VOICING_COLORS = [
  {fill:'#B5D4F4', stroke:'#185FA5', hl:'#e8f0fb', txt:'#185FA5'},
  {fill:'#FDE8C0', stroke:'#C76B00', hl:'#fef3e2', txt:'#7A3A00'},
  {fill:'#BAECD1', stroke:'#1A7A42', hl:'#e6f9ee', txt:'#0E5C2E'},
  {fill:'#EBD5F8', stroke:'#7B2FBE', hl:'#f6eafc', txt:'#4A1880'},
];

// Griffbrett-Strukturfarben & Deckkräfte je nach Hell-/Dunkelmodus
const DARK_MQ = window.matchMedia('(prefers-color-scheme: dark)');
function fbColors() {
  return DARK_MQ.matches
    ? {nut:'#9a9a9a', fret:'#aaa', string:'#9a8f86', inlay:'#5a534d', fretNum:'#888', strLbl:'#bbb', mute:'#ff6b6b', num:'#bbb', bandOp:0.30, hlOp:0.32}
    : {nut:'#555',    fret:'#888', string:'#444',    inlay:'#ccc',    fretNum:'#aaa', strLbl:'#666', mute:'#c33',    num:'#999', bandOp:0.65, hlOp:0.70};
}
// Wurzeltöne mit B-Vorzeichen → b-Notation; alle anderen → Kreuz-Notation
const FLAT_ROOTS  = new Set(['F','Bb','Eb','Ab','Db','Gb']);
const OPEN_SEMI  = [4, 11, 7, 2, 9, 4];  // Halbtonabstand der leeren Saite von C
const NOTES_SEMI = {C:0,Db:1,D:2,Eb:3,E:4,F:5,Gb:6,G:7,Ab:8,A:9,Bb:10,B:11};

// Halbtonabstand zwischen zwei SVG-Zeilen (höher/tiefer)
function semisBetween(rootRow, targetRow) {
  const steps = [5, 4, 5, 5, 5]; // row0→1=5, row1→2=4, row2→3=5, row3→4=5, row4→5=5
  let s = 0;
  if (targetRow < rootRow) {
    for (let r = targetRow; r < rootRow; r++) s += steps[r];
  } else {
    for (let r = rootRow; r < targetRow; r++) s -= steps[r];
  }
  return s;
}

// ── Akkordtypen ────────────────────────────────────────────────
const CHORD_TYPES = {
  dom7:   { name: 'Dom7',     ivs: ['1','3','5','b7'],   semis: [0,4,7,10] },
  maj7:   { name: 'Maj7',     ivs: ['1','3','5','7'],    semis: [0,4,7,11] },
  min7:   { name: 'Moll7',    ivs: ['1','b3','5','b7'],  semis: [0,3,7,10] },
  min7b5: { name: 'Moll7♭5', ivs: ['1','b3','b5','b7'],  semis: [0,3,6,10] },
  dim7:   { name: 'Dim7',    ivs: ['1','b3','b5','bb7'], semis: [0,3,6,9]  },
};

// ── Shape-Definitionen ─────────────────────────────────────────
// sd = Saitenoffset vom Root (negativ = dünner/höher), sl = Schlitz-Index im Akkord
const SHAPES_STD = [
  {id:'a', dots:[{sd:0,sl:0},{sd:0,sl:1},{sd:0,sl:2},{sd:0,sl:3}]},
  {id:'b', dots:[{sd:0,sl:0},{sd:0,sl:1},{sd:0,sl:2},{sd:-1,sl:3}]},
  {id:'c', dots:[{sd:0,sl:0},{sd:0,sl:1},{sd:-1,sl:2},{sd:-1,sl:3}]},
  {id:'d', dots:[{sd:0,sl:0},{sd:-2,sl:3},{sd:-1,sl:2},{sd:0,sl:1}]},
  {id:'e', dots:[{sd:0,sl:0},{sd:-1,sl:1},{sd:-1,sl:2},{sd:-1,sl:3}]},
  {id:'f', dots:[{sd:0,sl:0},{sd:-1,sl:1},{sd:-2,sl:3},{sd:-1,sl:2}]},
  {id:'g', dots:[{sd:0,sl:0},{sd:-1,sl:1},{sd:-2,sl:2},{sd:-2,sl:3}]},
  {id:'h', dots:[{sd:0,sl:0},{sd:-1,sl:1},{sd:-2,sl:2},{sd:-3,sl:3}]},
];
const SHAPES_MIN7 = [
  {id:'a', dots:[{sd:0,sl:0},{sd:0,sl:1},{sd:0,sl:2},{sd:0,sl:3}]},
  {id:'b', dots:[{sd:0,sl:0},{sd:0,sl:1},{sd:0,sl:2},{sd:-1,sl:3}]},
  {id:'c', dots:[{sd:0,sl:0},{sd:0,sl:1},{sd:-1,sl:2},{sd:-1,sl:3}]},
  {id:'d', dots:[{sd:0,sl:0},{sd:0,sl:1},{sd:-1,sl:2},{sd:-2,sl:3}]},
  {id:'e', dots:[{sd:0,sl:0},{sd:-1,sl:1},{sd:-1,sl:2},{sd:-1,sl:3}]},
  {id:'f', dots:[{sd:0,sl:0},{sd:-1,sl:1},{sd:-1,sl:2},{sd:-2,sl:3}]},
  {id:'g', dots:[{sd:0,sl:0},{sd:-1,sl:1},{sd:-2,sl:2},{sd:-2,sl:3}]},
  {id:'h', dots:[{sd:0,sl:0},{sd:-1,sl:1},{sd:-2,sl:2},{sd:-3,sl:3}]},
];
const SHAPES_BY_CHORD = {
  dom7: SHAPES_STD, maj7: SHAPES_STD, min7: SHAPES_MIN7, min7b5: SHAPES_STD, dim7: SHAPES_STD,
};

// 1. Umkehrung: sl:1 (Terz) liegt auf der Wurzelsaite (sd:0),
// sl:0 (Root) wandert – identische Saitenverteilungen wie SHAPES_STD
// aber der Root belegt die "letzte" Position jeder Verteilung
const SHAPES_INV1 = [
  {id:'a', dots:[{sd:0,sl:1},{sd:0,sl:2},{sd:0,sl:3},{sd:0, sl:0}]},  // 4-0-0-0
  {id:'b', dots:[{sd:0,sl:1},{sd:0,sl:2},{sd:0,sl:3},{sd:-1,sl:0}]},  // 3-1-0-0
  {id:'c', dots:[{sd:0,sl:1},{sd:0,sl:2},{sd:-1,sl:3},{sd:-1,sl:0}]}, // 2-2-0-0
  {id:'d', dots:[{sd:0,sl:1},{sd:0,sl:2},{sd:-1,sl:3},{sd:-2,sl:0}]}, // 2-1-1-0
  {id:'e', dots:[{sd:0,sl:1},{sd:-1,sl:2},{sd:-1,sl:3},{sd:-1,sl:0}]},// 1-3-0-0
  {id:'f', dots:[{sd:0,sl:1},{sd:-1,sl:2},{sd:-1,sl:3},{sd:-2,sl:0}]},// 1-2-1-0
  {id:'g', dots:[{sd:0,sl:1},{sd:-1,sl:2},{sd:-2,sl:3},{sd:-2,sl:0}]},// 1-1-2-0
  {id:'h', dots:[{sd:0,sl:1},{sd:-1,sl:2},{sd:-2,sl:3},{sd:-3,sl:0}]},// 1-1-1-1
];

// 2. Umkehrung: sl:2 (Quinte) auf Wurzelsaite, sl:1 (Terz) wandert zuletzt
const SHAPES_INV2 = [
  {id:'a', dots:[{sd:0,sl:2},{sd:0,sl:3},{sd:0,sl:0},{sd:0, sl:1}]},
  {id:'b', dots:[{sd:0,sl:2},{sd:0,sl:3},{sd:0,sl:0},{sd:-1,sl:1}]},
  {id:'c', dots:[{sd:0,sl:2},{sd:0,sl:3},{sd:-1,sl:0},{sd:-1,sl:1}]},
  {id:'d', dots:[{sd:0,sl:2},{sd:0,sl:3},{sd:-1,sl:0},{sd:-2,sl:1}]},
  {id:'e', dots:[{sd:0,sl:2},{sd:-1,sl:3},{sd:-1,sl:0},{sd:-1,sl:1}]},
  {id:'f', dots:[{sd:0,sl:2},{sd:-1,sl:3},{sd:-1,sl:0},{sd:-2,sl:1}]},
  {id:'g', dots:[{sd:0,sl:2},{sd:-1,sl:3},{sd:-2,sl:0},{sd:-2,sl:1}]},
  {id:'h', dots:[{sd:0,sl:2},{sd:-1,sl:3},{sd:-2,sl:0},{sd:-3,sl:1}]},
];

// 3. Umkehrung: sl:3 (Septime) auf Wurzelsaite, sl:2 (Quinte) wandert zuletzt
const SHAPES_INV3 = [
  {id:'a', dots:[{sd:0,sl:3},{sd:0,sl:0},{sd:0,sl:1},{sd:0, sl:2}]},
  {id:'b', dots:[{sd:0,sl:3},{sd:0,sl:0},{sd:0,sl:1},{sd:-1,sl:2}]},
  {id:'c', dots:[{sd:0,sl:3},{sd:0,sl:0},{sd:-1,sl:1},{sd:-1,sl:2}]},
  {id:'d', dots:[{sd:0,sl:3},{sd:0,sl:0},{sd:-1,sl:1},{sd:-2,sl:2}]},
  {id:'e', dots:[{sd:0,sl:3},{sd:-1,sl:0},{sd:-1,sl:1},{sd:-1,sl:2}]},
  {id:'f', dots:[{sd:0,sl:3},{sd:-1,sl:0},{sd:-1,sl:1},{sd:-2,sl:2}]},
  {id:'g', dots:[{sd:0,sl:3},{sd:-1,sl:0},{sd:-2,sl:1},{sd:-2,sl:2}]},
  {id:'h', dots:[{sd:0,sl:3},{sd:-1,sl:0},{sd:-2,sl:1},{sd:-3,sl:2}]},
];

// Alle Gruppen mit count=8; isShapeValid filtert physisch unmögliche raus
const GROUPS = {
  '1': { prefix:'1', rs:5, count:8 },
  '2': { prefix:'2', rs:4, count:8 },
  '3': { prefix:'3', rs:3, count:8 },
  '4': { prefix:'4', rs:2, count:8 },
  '5': { prefix:'5', rs:1, count:8 },
  '6': { prefix:'6', rs:0, count:8 },
};

// ── Drop-2 Lagen ───────────────────────────────────────────────
// Absolutes MIDI-Pitch der leeren Saiten (row 0=hoch-E … row 5=tief-E)
const OPEN_MIDI = [64, 59, 55, 50, 45, 40];
// Zwei Saitengruppen für Drop-2 (Reihenfolge: tief → hoch)
const DROP2_GRPS = [
  { label: 'E–A–D–G', badge: 'tief',  rows: [5, 4, 3, 2] },
  { label: 'A–D–G–H', badge: 'Mitte', rows: [4, 3, 2, 1] },
  { label: 'D–G–H–E', badge: 'hoch',  rows: [3, 2, 1, 0] },
];
// Drop-3: Bass allein, eine Saite übersprungen (gemutet), darüber 3 benachbarte
const DROP3_GRPS = [
  { label: 'E–⊗–D–G–H', badge: 'tief', rows: [5, 3, 2, 1], mute: 4 },
  { label: 'A–⊗–G–H–E', badge: 'hoch', rows: [4, 2, 1, 0], mute: 3 },
];
function dropGrps()  { return curDropType === 3 ? DROP3_GRPS : DROP2_GRPS; }
// Slot-Reihenfolge Bass→hoch je Drop-Typ und Start-Slot
function dropSlotOrder(dropType, s) {
  return dropType === 3
    ? [s, (s+3)%4, (s+1)%4, (s+2)%4]   // Drop-3: Root, b7, 3, 5
    : [s, (s+2)%4, (s+3)%4, (s+1)%4];  // Drop-2: Root, 5, b7, 3
}

// ── Navigations-Tabellen ───────────────────────────────────────
const GRUNDTON_ORDER = ['C','Db','D','Eb','E','F','Gb','G','Ab','A','Bb','B'];
const CHORD_ORDER  = ['dom7','maj7','min7','min7b5','dim7'];
const CHORD_LABELS = { dom7:'Dom7', maj7:'Maj7', min7:'Moll7', min7b5:'Moll7♭5', dim7:'Dim7' };
const GROUP_ORDER  = ['1','2','3','4','5','6'];
const GROUP_LABELS = { '1':'tief-E', '2':'A', '3':'D', '4':'G', '5':'H', '6':'hoch-E' };

// Griffbild-Gruppe → passende Drop-Gruppe (für Kontext-Overlay)
const GRPD2MAP = {'1':0, '2':1, '3':2, '4':0, '5':1, '6':2};
const GRPD3MAP = {'1':0, '2':1, '3':0, '4':1, '5':0, '6':1};

// ── Zustand ────────────────────────────────────────────────────
let curChord        = 'dom7';
let curGroup        = '2';
let curShpIdx       = 0;
let curGrundton     = 'C';
let curInversion    = 0;
let curLabelMode    = 'iv';
let curMode         = 'griffbild'; // 'griffbild' | 'drop2'
let curDropType     = 2;           // 2 oder 3
let curDrop2Grp     = 0;           // index in aktueller Drop-Gruppenliste
let curDrop2Voicing = 0;
let curCtxVoicings  = new Set();   // aktive Kontext-Voicings im Griffbild (0–3)
let curCtxDropType  = 2;           // Overlay-Voicing-Typ im Griffbild (2 oder 3)

function getShapes() {
  if (curInversion === 1) return SHAPES_INV1;
  if (curInversion === 2) return SHAPES_INV2;
  if (curInversion === 3) return SHAPES_INV3;
  return SHAPES_BY_CHORD[curChord];
}
function ivDisp(iv)  { return iv.replace(/b/g, '♭'); }

// Intervall eines Slots relativ zum Bass-Slot der Umkehrung (negativ → +12)
function invInterval(sl, semis) {
  const diff = semis[sl] - semis[curInversion];
  return diff < 0 ? diff + 12 : diff;
}

// Bund des Bass-Tons (abhängig von Umkehrung) auf Saite rs
function calcBassFret(rs) {
  const chord = CHORD_TYPES[curChord];
  const bassNoteSemi = (NOTES_SEMI[curGrundton] + chord.semis[curInversion]) % 12;
  const diff = (bassNoteSemi - OPEN_SEMI[rs] + 12) % 12;
  return diff === 0 ? 12 : diff;
}

// Prüft ob alle 4 Punkte des Shapes auf dem Griffbrett liegen (Bund 1–FC)
function isShapeValid(shpIdx, rs) {
  const bassFret = calcBassFret(rs);
  const shape    = getShapes()[shpIdx];
  const chord    = CHORD_TYPES[curChord];
  for (const d of shape.dots) {
    const targetRow = rs + d.sd;
    if (targetRow < 0 || targetRow > 5) return false;
    const fret = bassFret + invInterval(d.sl, chord.semis) - semisBetween(rs, targetRow);
    if (fret < 1 || fret > FC) return false;
  }
  return true;
}

// Gibt alle gültigen Shape-Indizes für aktuelle Gruppe zurück
function validShapeIndices() {
  const grp = GROUPS[curGroup];
  const res = [];
  for (let i = 0; i < grp.count; i++) {
    if (isShapeValid(i, grp.rs)) res.push(i);
  }
  return res;
}

// Berechnet Punkte (nur gültige)
function computeDots(shpIdx, rs) {
  const bassFret = calcBassFret(rs);
  const shape    = getShapes()[shpIdx];
  const chord    = CHORD_TYPES[curChord];
  return shape.dots.map(d => {
    const targetRow = rs + d.sd;
    if (targetRow < 0 || targetRow > 5) return null;
    const fret = bassFret + invInterval(d.sl, chord.semis) - semisBetween(rs, targetRow);
    if (fret < 1 || fret > FC) return null;
    return { s: targetRow, f: fret, iv: chord.ivs[d.sl] };
  }).filter(Boolean);
}

// ── Drop-2 Berechnung ──────────────────────────────────────────
const D2_MF = 15; // Maximaler Bund für Drop-2-Darstellung

// Erste Lage mit gegebenem Slot-Order (Drop-2-Muster), offene Saiten erlaubt
function d2v0(rootSemi, chordSemis, rows, slotOrd) {
  const frets = [], slots = [], midis = [];
  let prev = -Infinity;
  for (let i = 0; i < 4; i++) {
    const openM  = OPEN_MIDI[rows[i]];
    const target = (rootSemi + chordSemis[slotOrd[i]]) % 12;
    let f = (target - openM % 12 + 12) % 12;
    let m = openM + f;
    while (m <= prev) { f += 12; m += 12; }
    if (f > D2_MF) return null;
    frets.push(f); slots.push(slotOrd[i]); midis.push(m);
    prev = m;
  }
  return { frets, slots, midis };
}

// Nächste Lage: jeden Ton zur nächsten Akkordnote verschieben (aufsteigend)
function d2shift(prev, rows, chordSemis, rootSemi) {
  const frets = [], slots = [], midis = [];
  let prevNewMidi = -Infinity;
  for (let i = 0; i < 4; i++) {
    const openM   = OPEN_MIDI[rows[i]];
    const newSlot = (prev.slots[i] + 1) % 4;
    const target  = (rootSemi + chordSemis[newSlot]) % 12;
    let f = (target - openM % 12 + 12) % 12;
    let m = openM + f;
    const minMidi = Math.max(prev.midis[i], prevNewMidi);
    while (m <= minMidi) { f += 12; m += 12; }
    if (f > D2_MF) return null;
    frets.push(f); slots.push(newSlot); midis.push(m);
    prevNewMidi = m;
  }
  return { frets, slots, midis };
}

// Tiefstmögliche Lage suchen, dann diatonisch hochschieben bis Bund D2_MF
// überschritten würde – zeigt so auch Oktav-Wiederholungen bis zum 15. Bund
function getDropVoicings(dropType, grpIdx) {
  const grps  = dropType === 3 ? DROP3_GRPS : DROP2_GRPS;
  const grp   = grps[grpIdx];
  const chord = CHORD_TYPES[curChord];
  const root  = NOTES_SEMI[curGrundton];

  // Tiefste Startlage über alle 4 Start-Slots
  let start = null, startMax = Infinity;
  for (let s = 0; s < 4; s++) {
    const v0 = d2v0(root, chord.semis, grp.rows, dropSlotOrder(dropType, s));
    if (!v0) continue;
    const mx = Math.max(...v0.frets);
    if (mx < startMax) { startMax = mx; start = v0; }
  }
  if (!start) return [];

  // Aufwärts schichten, bis der nächste Akkord nicht mehr passt (max. 8 Lagen)
  const list = [start];
  while (list.length < 8) {
    const v = d2shift(list[list.length - 1], grp.rows, chord.semis, root);
    if (!v) break;
    list.push(v);
  }
  return list;
}

function renderDrop2() {
  const grp   = dropGrps()[curDrop2Grp];
  const chord = CHORD_TYPES[curChord];
  const vlist = getDropVoicings(curDropType, curDrop2Grp);

  document.getElementById('badge').textContent = vlist.length ? `${vlist.length} Lagen` : '–';

  if (vlist.length) {
    const isFlat = FLAT_ROOTS.has(curGrundton);
    const bassNotes = vlist.map(v => {
      const n = (NOTES_SEMI[curGrundton] + chord.semis[v.slots[0]]) % 12;
      return (isFlat ? NOTES_FLAT : NOTES_SHARP)[n] + ' (' + ivDisp(chord.ivs[v.slots[0]]) + ')';
    });
    document.getElementById('akkord-desc').textContent =
      `Drop ${curDropType} · ${chord.name} · ${curGrundton} · ${grp.label} · ${bassNotes.join(' – ')}`;
  } else {
    document.getElementById('akkord-desc').textContent =
      `Keine Drop-${curDropType}-Lagen für ${curGrundton} ${chord.name} auf ${grp.label}`;
  }

  // SVG – Bund 0 bis D2_MF, breiterer linker Rand für offene Saiten
  const svg = document.getElementById('akkord-fb');
  const W=760, H=162, L=36, R=W-4, T=16, B=H-14, SC=6;
  const fW = (R - L) / D2_MF;
  const sH = (B - T) / (SC - 1);
  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
  svg.innerHTML = '';
  const ap = e => svg.appendChild(e);
  const C = fbColors();

  // Sattel
  ap(mk('rect', {x:L-4, y:T-2, width:5, height:(SC-1)*sH+4, fill:C.nut}));

  // Bundlinien 0–D2_MF
  for (let f = 0; f <= D2_MF; f++)
    ap(mk('line', {x1:L+f*fW, y1:T, x2:L+f*fW, y2:B,
      stroke:C.fret, 'stroke-width':f===0?2:0.7, opacity:0.5}));

  // Saiten (bis vor Sattel, damit offene-Saiten-Punkte Platz haben)
  const tk = [1.2,1.1,1.0,1.6,1.9,2.2];
  for (let s = 0; s < SC; s++)
    ap(mk('line', {x1:L-28, y1:T+s*sH, x2:R, y2:T+s*sH,
      stroke:C.string, 'stroke-width':tk[s], opacity:0.4}));

  // Bundmarkierungen
  for (const f of [3,5,7,9,12,15]) {
    const cx = L + (f-0.5)*fW;
    if (f===12) [1.5,3.5].forEach(o=>ap(mk('circle',{cx,cy:T+o*sH,r:3.5,fill:C.inlay})));
    else ap(mk('circle',{cx,cy:T+2.5*sH,r:3.5,fill:C.inlay}));
    ap(tx(String(f), cx, B+11, 8, C.fretNum, 'middle'));
  }
  ap(tx('0', L-14, B+11, 8, C.fretNum, 'middle'));

  // Saitenbeschriftungen
  for (let s = 0; s < SC; s++) {
    const t = tx(OPEN_STR[s], L-24, T+s*sH+3, 9, C.strLbl, 'middle');
    t.setAttribute('font-weight','600'); ap(t);
  }

  // Gemutete Saite (Drop-3): durchgehendes ✕ am Sattel markieren
  if (grp.mute !== undefined) {
    const mt = tx('✕', L-14, T+grp.mute*sH+4, 11, C.mute, 'middle');
    mt.setAttribute('font-weight','700'); ap(mt);
  }

  if (!vlist.length) return;

  // cx für Bund f (Bund 0 = vor Sattel)
  function cxOf(f) { return f === 0 ? L-14 : L + (f-0.5)*fW; }

  // Hintergrundbänder (zuerst, damit Punkte darüber liegen)
  vlist.forEach((v, vi) => {
    const fretsF = v.frets.filter(f => f > 0);
    if (!fretsF.length) return;
    const lo = Math.min(...fretsF), hi = Math.max(...fretsF);
    const hx1 = L+(lo-1)*fW, hx2 = L+hi*fW;
    svg.insertBefore(
      mk('rect', {x:hx1, y:T-4, width:hx2-hx1, height:(SC-1)*sH+8,
        fill:VOICING_COLORS[vi % 4].hl, rx:4, opacity:C.bandOp}),
      svg.firstChild
    );
    ap(tx(String((vi % 4)+1), (hx1+hx2)/2, T-6, 9, C.num, 'middle'));
  });

  // Punkte aller Lagen – alle 4 Töne einer Lage gleiche Farbe
  vlist.forEach((v, vi) => {
    const c = VOICING_COLORS[vi % 4]; // zyklisch – Oktav-Wiederholung = gleiche Farbe
    for (let i = 0; i < 4; i++) {
      const row  = grp.rows[i];
      const fret = v.frets[i];
      const slot = v.slots[i];
      const iv   = chord.ivs[slot];
      const cx   = cxOf(fret);
      const cy   = T + row*sH;
      const isRoot = slot === 0;
      if (fret === 0) {
        ap(mk('circle', {cx, cy, r:7, fill:'white', stroke:c.stroke, 'stroke-width':2}));
      } else {
        ap(mk('circle', {cx, cy, r:8, fill:c.fill, stroke:c.stroke,
          'stroke-width': isRoot ? 2.8 : 1.5}));
        let lbl;
        if (curLabelMode === 'tone') {
          const useFlat = FLAT_ROOTS.has(curGrundton) || iv.startsWith('b');
          lbl = (useFlat ? NOTES_FLAT : NOTES_SHARP)[(OPEN_SEMI[row]+fret)%12];
        } else { lbl = ivDisp(iv); }
        const fs = lbl.length>2 ? 7.5 : lbl.length>1 ? 8.5 : 9.5;
        const tl = tx(lbl, cx, cy+3.5, fs, c.txt, 'middle');
        tl.setAttribute('font-weight','500'); ap(tl);
      }
    }
  });
}

// ── UI aufbauen ────────────────────────────────────────────────
function buildLegend() {
  const box    = document.getElementById('legendBox');
  box.innerHTML = '';
  const labels    = ['(Root)', '(Terz)', '(Quinte)', '(Septime)'];
  const dotCls    = ['root','inv','inv2','inv3'];
  CHORD_TYPES[curChord].ivs.forEach((iv, i) => {
    const div = document.createElement('div'); div.className = 'legend-item';
    const dot = document.createElement('div');
    const active = i === curInversion && curMode === 'griffbild';
    dot.className = 'legend-dot' + (active ? ' ' + dotCls[i] : '');
    div.appendChild(dot);
    const sp = document.createElement('span');
    sp.textContent = ivDisp(iv) + ' ' + labels[i];
    div.appendChild(sp);
    box.appendChild(div);
  });
}

function buildShpSel() {
  const valid = validShapeIndices();
  if (!valid.includes(curShpIdx)) {
    curShpIdx = valid.length > 0 ? valid[0] : 0;
  }
}

// ── SVG Rendering ──────────────────────────────────────────────
function render() {
  saveState();
  if (curMode === 'drop2') { renderDrop2(); return; }
  const grp    = GROUPS[curGroup];
  const rs     = grp.rs;
  const shapes = getShapes();
  const valid  = validShapeIndices();

  // Aktuellen Shape sicherstellen
  if (!valid.includes(curShpIdx) && valid.length > 0) curShpIdx = valid[0];

  const hasShape = valid.includes(curShpIdx);
  const shape    = hasShape ? shapes[curShpIdx] : null;
  const label    = shape ? (grp.prefix + shape.id).toUpperCase() : '–';
  const bassFret = calcBassFret(rs);
  const strNames = ['hoch-E','H','G','D','A','tief-E'];
  const labelMode = curLabelMode;
  const INV_LABELS = ['Grundstellung','1. Umkehrung','2. Umkehrung','3. Umkehrung'];
  const invLabel = INV_LABELS[curInversion] || 'Grundstellung';
  const col = VOICING_COLORS[curInversion] || VOICING_COLORS[0];
  const dotFill   = col.fill;
  const dotStroke = col.stroke;
  const hlFill    = col.hl;
  const txtColor  = col.txt;

  document.getElementById('badge').textContent = label;
  document.getElementById('akkord-desc').textContent = valid.length === 0
    ? `Kein Griffbild für ${curGrundton} auf ${strNames[rs]}-Saite (Bundlage außerhalb 1–${FC})`
    : `${CHORD_TYPES[curChord].name} · ${curGrundton} · ${invLabel} · ${strNames[rs]}-Saite Bund ${bassFret} · Lage ${label}`;

  // SVG-Dimensionen: FC=18, L=26 (wenig links-Abstand)
  const svg = document.getElementById('akkord-fb');
  const W=760, H=162, L=16, R=W-4, T=16, B=H-14, SC=6;
  const fW = (R-L)/FC;
  const sH = (B-T)/(SC-1);
  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
  svg.innerHTML = '';
  const ap = e => svg.appendChild(e);
  const C = fbColors();

  // Sattel
  ap(mk('rect', {x:L-4, y:T-2, width:5, height:(SC-1)*sH+4, fill:C.nut}));

  // Bundlinien
  for (let f = 0; f <= FC; f++) {
    ap(mk('line', {x1:L+f*fW, y1:T, x2:L+f*fW, y2:B,
      stroke:C.fret, 'stroke-width': f===0 ? 2 : 0.7, opacity:0.5}));
  }

  // Saiten
  const tk = [1.2, 1.1, 1.0, 1.6, 1.9, 2.2];
  for (let s = 0; s < SC; s++) {
    ap(mk('line', {x1:L-4, y1:T+s*sH, x2:R, y2:T+s*sH,
      stroke:C.string, 'stroke-width':tk[s], opacity:0.4}));
  }

  // Bundmarkierungen (Inlays)
  for (const f of [3,5,7,9,12,15,17]) {
    const cx = L + (f-0.5)*fW;
    if (f === 12) {
      [1.5, 3.5].forEach(o => ap(mk('circle', {cx, cy:T+o*sH, r:3.5, fill:C.inlay})));
    } else {
      ap(mk('circle', {cx, cy:T+2.5*sH, r:3.5, fill:C.inlay}));
    }
    ap(tx(String(f), cx, B+11, 8, C.fretNum, 'middle'));
  }

  // Saitenbeschriftungen (links vom Sattel)
  for (let s = 0; s < SC; s++) {
    const t = tx(OPEN_STR[s], L-8,  T+s*sH+3, 9,  C.strLbl, 'middle');
    t.setAttribute('font-weight', '600');
    ap(t);
  }

  if (!hasShape) return;

  // Punkte berechnen
  const dots = computeDots(curShpIdx, rs);
  if (!dots.length) return;

  // Highlight-Zone hinter den Punkten
  const frets = dots.map(d => d.f);
  const lo = Math.min(...frets), hi = Math.max(...frets);
  const hx1 = Math.max(L, L+(lo-1)*fW);
  const hx2 = Math.min(R, L+hi*fW);
  if (hx2 > hx1) {
    const bg = mk('rect', {x:hx1, y:T-4, width:hx2-hx1,
      height:(SC-1)*sH+8, fill:hlFill, rx:4, opacity:C.hlOp});
    svg.insertBefore(bg, svg.firstChild);
  }

  // Drop Kontext-Overlay (hinter den Griffbild-Dots)
  if (curCtxVoicings.size > 0) {
    const gMap   = curCtxDropType === 3 ? GRPD3MAP : GRPD2MAP;
    const grps   = curCtxDropType === 3 ? DROP3_GRPS : DROP2_GRPS;
    const dGrpIdx = gMap[curGroup];
    const grp2 = grps[dGrpIdx];
    const vlist2 = getDropVoicings(curCtxDropType, dGrpIdx);
    const chord2 = CHORD_TYPES[curChord];
    const CTX = {fill:'#dce7f0', stroke:'#7a94b0', txt:'#3d5878'};
    vlist2.forEach((v, vi) => {
      if (!curCtxVoicings.has(vi)) return;
      for (let i = 0; i < 4; i++) {
        const fret = v.frets[i];
        if (fret < 1 || fret > FC) continue;
        const cx = L + (fret - 0.5) * fW;
        const cy = T + grp2.rows[i] * sH;
        ap(mk('circle', {cx, cy, r:8, fill:CTX.fill, stroke:CTX.stroke, 'stroke-width':1.5, opacity:0.45}));
        let lbl;
        if (curLabelMode === 'tone') {
          const iv = chord2.ivs[v.slots[i]];
          const useFlat = FLAT_ROOTS.has(curGrundton) || iv.startsWith('b');
          lbl = (useFlat ? NOTES_FLAT : NOTES_SHARP)[(OPEN_SEMI[grp2.rows[i]] + fret) % 12];
        } else {
          lbl = ivDisp(chord2.ivs[v.slots[i]]);
        }
        const fs = lbl.length > 2 ? 7.5 : lbl.length > 1 ? 8.5 : 9.5;
        const tl = tx(lbl, cx, cy + 3.5, fs, CTX.txt, 'middle');
        tl.setAttribute('font-weight', '500'); tl.setAttribute('opacity', '0.65'); ap(tl);
      }
    });
  }

  // Punkte zeichnen
  dots.forEach(d => {
    const cx = L + (d.f-0.5)*fW;
    const cy = T + d.s*sH;
    const isRoot = d.iv === '1'; // Grundton immer hervorheben, unabhängig von der Umkehrung
    ap(mk('circle', {cx, cy, r:8,  fill:dotFill,
      stroke:dotStroke, 'stroke-width': isRoot ? 2.8 : 1.5}));
    let lbl;
    if (labelMode === 'tone') {
      const useFlatArr = FLAT_ROOTS.has(curGrundton) || d.iv.startsWith('b');
      lbl = (useFlatArr ? NOTES_FLAT : NOTES_SHARP)[(OPEN_SEMI[d.s] + d.f) % 12];
    } else {
      lbl = ivDisp(d.iv);
    }
    const fs = lbl.length > 2 ? 7.5 : lbl.length > 1 ? 8.5 : 9.5;
    const tl = tx(lbl, cx, cy+3.5, fs, txtColor, 'middle');
    tl.setAttribute('font-weight', '500');
    ap(tl);
  });
}

// ── SVG-Helfer ─────────────────────────────────────────────────
function mk(tag, attrs) {
  const e = document.createElementNS('http://www.w3.org/2000/svg', tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  return e;
}
function tx(content, x, y, fs, fill, anchor) {
  const e = document.createElementNS('http://www.w3.org/2000/svg', 'text');
  e.setAttribute('x', x); e.setAttribute('y', y);
  e.setAttribute('font-size', fs); e.setAttribute('fill', fill);
  e.setAttribute('text-anchor', anchor);
  e.textContent = content;
  return e;
}

// ── Event-Handler (manuelle Bedienung) ────────────────────────
function setInversion(n) {
  curInversion = n;
  document.querySelectorAll('.inv-btn').forEach((b, i) => {
    b.classList.remove('inv-aktiv-0', 'inv-aktiv-1', 'inv-aktiv-2', 'inv-aktiv-3');
    if (i === n) b.classList.add('inv-aktiv-' + n);
  });
  // curShpIdx bleibt – buildShpSel() prüft Gültigkeit und passt ggf. an
  buildShpSel(); render();
}

function navGrundton(dir) {
  const i = GRUNDTON_ORDER.indexOf(curGrundton);
  curGrundton = GRUNDTON_ORDER[(i + dir + GRUNDTON_ORDER.length) % GRUNDTON_ORDER.length];
  document.getElementById('grundton-sel').value = curGrundton;
  if (window.parent !== window) window.parent.postMessage({grundtonUpdate: curGrundton}, '*');
  buildLegend(); buildShpSel(); render();
}
function setGrundtonSel(val) {
  curGrundton = val;
  if (window.parent !== window) window.parent.postMessage({grundtonUpdate: curGrundton}, '*');
  buildLegend(); buildShpSel(); render();
}
function navChord(dir) {
  const i = CHORD_ORDER.indexOf(curChord);
  curChord = CHORD_ORDER[(i + dir + CHORD_ORDER.length) % CHORD_ORDER.length];
  document.getElementById('chord-badge').textContent = CHORD_LABELS[curChord];
  curShpIdx = 0; curDrop2Voicing = 0;
  buildLegend(); buildShpSel(); render();
}
function navSaite(dir) {
  if (curMode === 'drop2') {
    const grps = dropGrps();
    curDrop2Grp = (curDrop2Grp + dir + grps.length) % grps.length;
    curDrop2Voicing = 0;
    document.getElementById('saite-badge').textContent = grps[curDrop2Grp].badge;
    render(); return;
  }
  const i = GROUP_ORDER.indexOf(curGroup);
  curGroup = GROUP_ORDER[(i + dir + GROUP_ORDER.length) % GROUP_ORDER.length];
  document.getElementById('saite-badge').textContent = GROUP_LABELS[curGroup];
  curShpIdx = 0;
  buildShpSel(); render();
}
function toggleAnzeige() {
  curLabelMode = curLabelMode === 'iv' ? 'tone' : 'iv';
  document.getElementById('anzeige-btn').textContent = curLabelMode === 'iv' ? 'Intervall' : 'Akkordton';
  render();
}
function nav(dir) {
  if (curMode === 'drop2') return;
  const valid = validShapeIndices();
  if (!valid.length) return;
  const pos = valid.indexOf(curShpIdx);
  const next = (pos + dir + valid.length) % valid.length;
  curShpIdx = valid[next];
  buildShpSel(); render();
}

function toggleCtxVoicing(vi) {
  if (curCtxVoicings.has(vi)) curCtxVoicings.delete(vi);
  else curCtxVoicings.add(vi);
  const btn = document.getElementById('ctx-btn-' + vi);
  btn.classList.toggle('ctx-aktiv-' + vi, curCtxVoicings.has(vi));
  render();
}

function toggleCtxDropType() {
  curCtxDropType = curCtxDropType === 2 ? 3 : 2;
  document.getElementById('ctx-drop-btn').textContent = 'Drop ' + curCtxDropType;
  render();
}

function toggleDropType() {
  curDropType = curDropType === 2 ? 3 : 2;
  const grps = dropGrps();
  if (curDrop2Grp >= grps.length) curDrop2Grp = grps.length - 1;
  document.getElementById('droptype-btn').textContent = 'Drop ' + curDropType;
  document.getElementById('saite-badge').textContent  = grps[curDrop2Grp].badge;
  render();
}

function toggleMode() {
  curMode = curMode === 'griffbild' ? 'drop2' : 'griffbild';
  const isD2 = curMode === 'drop2';
  document.getElementById('mode-btn').textContent        = isD2 ? 'Griffbild' : 'Akkordbild';
  document.getElementById('umkehrung-row').style.display = isD2 ? 'none' : '';
  document.getElementById('ctx-row').style.display       = isD2 ? 'none' : '';
  document.getElementById('droptype-btn').style.display  = isD2 ? '' : 'none';
  document.getElementById('saite-badge').textContent     = isD2 ? dropGrps()[curDrop2Grp].badge : GROUP_LABELS[curGroup];
  if (isD2) curDrop2Voicing = 0;
  buildLegend(); render();
}

// ── Zustand merken (localStorage) ─────────────────────────────
const LS_KEY = 'akkordGriffbrett.v1';
function saveState() {
  try {
    localStorage.setItem(LS_KEY, JSON.stringify({
      mode:curMode, dropType:curDropType, dropGrp:curDrop2Grp, group:curGroup,
      label:curLabelMode, inv:curInversion, shp:curShpIdx,
      ctx:[...curCtxVoicings], ctxDrop:curCtxDropType,
      chord:curChord, grundton:curGrundton
    }));
  } catch (e) {}
}
function loadState() {
  try {
    const s = JSON.parse(localStorage.getItem(LS_KEY) || '{}');
    if (s.mode === 'drop2' || s.mode === 'griffbild') curMode = s.mode;
    if (s.dropType === 2 || s.dropType === 3) curDropType = s.dropType;
    if (Number.isInteger(s.dropGrp)) curDrop2Grp = s.dropGrp;
    if (GROUPS[s.group]) curGroup = s.group;
    if (s.label === 'iv' || s.label === 'tone') curLabelMode = s.label;
    if (Number.isInteger(s.inv) && s.inv >= 0 && s.inv <= 3) curInversion = s.inv;
    if (Number.isInteger(s.shp)) curShpIdx = s.shp;
    if (Array.isArray(s.ctx)) curCtxVoicings = new Set(s.ctx.filter(n => Number.isInteger(n) && n >= 0 && n <= 4));
    if (s.ctxDrop === 2 || s.ctxDrop === 3) curCtxDropType = s.ctxDrop;
    if (CHORD_TYPES[s.chord]) curChord = s.chord;
    if (s.grundton && NOTES_SEMI[s.grundton] !== undefined) curGrundton = s.grundton;
    const gl = dropGrps().length;        // dropGrp gegen aktuelle Gruppenliste absichern
    if (curDrop2Grp >= gl) curDrop2Grp = gl - 1;
  } catch (e) {}
}
// Alle Bedienelemente an den aktuellen Zustand angleichen (nach loadState)
function applyStateToUI() {
  const isD2 = curMode === 'drop2';
  document.getElementById('grundton-sel').value      = curGrundton;
  document.getElementById('chord-badge').textContent = CHORD_LABELS[curChord];
  document.getElementById('mode-btn').textContent        = isD2 ? 'Griffbild' : 'Akkordbild';
  document.getElementById('umkehrung-row').style.display = isD2 ? 'none' : '';
  document.getElementById('ctx-row').style.display       = isD2 ? 'none' : '';
  document.getElementById('droptype-btn').style.display  = isD2 ? '' : 'none';
  document.getElementById('droptype-btn').textContent    = 'Drop ' + curDropType;
  document.getElementById('ctx-drop-btn').textContent    = 'Drop ' + curCtxDropType;
  document.getElementById('saite-badge').textContent     = isD2 ? dropGrps()[curDrop2Grp].badge : GROUP_LABELS[curGroup];
  document.getElementById('anzeige-btn').textContent     = curLabelMode === 'iv' ? 'Intervall' : 'Akkordton';
  document.querySelectorAll('.inv-btn').forEach((b, i) => {
    b.classList.remove('inv-aktiv-0', 'inv-aktiv-1', 'inv-aktiv-2', 'inv-aktiv-3');
    if (i === curInversion) b.classList.add('inv-aktiv-' + curInversion);
  });
  [0, 1, 2, 3, 4].forEach(vi => {
    document.getElementById('ctx-btn-' + vi).classList.toggle('ctx-aktiv-' + vi, curCtxVoicings.has(vi));
  });
}

// ── Sync vom Elternfenster (akkord-bandit.html) ───────────────
// Elternseite schickt { chord: 'dom7'|'maj7'|'moll7'|'moll7b5', grundton: 'C'…'B' }
const CHORD_MAP = { dom7:'dom7', maj7:'maj7', moll7:'min7', moll7b5:'min7b5', dim7:'dim7' };
window.addEventListener('message', (e) => {
  const data = e.data || {};
  let changed = false;
  if (data.chord && CHORD_MAP[data.chord] && CHORD_MAP[data.chord] !== curChord) {
    curChord = CHORD_MAP[data.chord];
    document.getElementById('chord-badge').textContent = CHORD_LABELS[curChord];
    changed = true;
  }
  if (data.grundton && NOTES_SEMI[data.grundton] !== undefined && data.grundton !== curGrundton) {
    curGrundton = data.grundton;
    document.getElementById('grundton-sel').value = curGrundton;
    changed = true;
  }
  if (changed) {
    // Shape nur zurücksetzen wenn er durch die neue Konstellation ungültig wird;
    // buildShpSel() erledigt das automatisch – kein harter Reset auf 0
    buildLegend(); buildShpSel(); render();
  }
});

// ── Init ───────────────────────────────────────────────────────
(function() {
  const sel = document.getElementById('grundton-sel');
  GRUNDTON_ORDER.forEach(n => {
    const o = document.createElement('option');
    o.value = n; o.textContent = n; sel.appendChild(o);
  });
  loadState();
  applyStateToUI();
})();
buildLegend();
buildShpSel();
render();
// Bei OS-Theme-Wechsel Griffbrett neu zeichnen (Dark-Mode-Farben)
DARK_MQ.addEventListener('change', render);
</script>
